a\uff0c\u6211\u5011\u63a5\u8457\u9032\u5165\u7b2c\u4e8c\u55ae\u5143\uff01\", \"2\": \"\u3010\u4e3b\u6301\u4eba \u5c0e\u5e2b\u3011\uff1a\u6b61\u8fce\u4f86\u5230\u7b2c\u4e8c\u55ae\u5143\u3010Module 2\uff1a\u4f9d\u6cd5\u884c\u653f\u539f\u5247\u8207\u5c64\u6b21\u5316\u6cd5\u5f8b\u4fdd\u7559\u3011\u3002\u5982\u679c\u8aaa\u884c\u653f\u6cd5\u6709\u4e00\u5ea7\u4e0d\u53ef\u52d5\u6416\u7684\u57fa\u77f3\uff0c\u90a3\u7121\u7591\u5c31\u662f\u300c\u4f9d\u6cd5\u884c\u653f\u539f\u5247\u300d\uff01\\n\\n\u4f9d\u6cd5\u884c\u653f\u53ef\u4ee5\u62c6\u89e3\u70ba\u5169\u5927\u652f\u67f1\uff1a\u7b2c\u4e00\u662f\u300c\u6d88\u6975\u7684\u4f9d\u6cd5\u884c\u653f\u300d\uff0c\u4e5f\u5c31\u662f\u300c\u6cd5\u5f8b\u512a\u4f4d\u539f\u5247\u300d\u3002\u300a\u884c\u653f\u7a0b\u5e8f\u6cd5\u300b\u7b2c 4 \u689d\u660e\u78ba\u898f\u5b9a\uff1a\u300c\u884c\u653f\u884c\u70ba\u61c9\u53d7\u6cd5\u5f8b\u53ca\u4e00\u822c\u6cd5\u5f8b\u539f\u5247\u4e4b\u62d8\u675f\u3002\u300d\u610f\u601d\u662f\u884c\u653f\u6a5f\u95dc\u505a\u51fa\u7684\u4efb\u4f55\u547d\u4ee4\u6216\u8655\u5206\uff0c\u7d55\u4e0d\u80fd\u62b5\u89f8\u7acb\u6cd5\u9662\u4e09\u8b80\u901a\u904e\u7684\u6cd5\u5f8b\uff0c\u5426\u5247\u4e00\u5f8b\u7121\u6548\uff01\\n\\n\u7b2c\u4e8c\u662f\u300c\u7a4d\u6975\u7684\u4f9d\u6cd5\u884c\u653f\u300d\uff0c\u4e5f\u5c31\u662f\u5927\u8003\u6700\u611b\u8003\u7684\u300c\u6cd5\u5f8b\u4fdd\u7559\u539f\u5247\u300d\u3002\u6c92\u6709\u6cd5\u5f8b\u7684\u6388\u6b0a\uff0c\u884c\u653f\u6a5f\u95dc\u5c31\u4e0d\u80fd\u64c5\u81ea\u9650\u5236\u4eba\u6c11\u7684\u81ea\u7531\u8207\u8ca1\u7522\uff01\u800c\u95dc\u65bc\u6cd5\u5f8b\u4fdd\u7559\u7684\u6388\u6b0a\u5bc6\u5ea6\uff0c\u5927\u5bb6\u52d9\u5fc5\u719f\u8a18\u81fa\u7063\u6cd5\u6cbb\u570b\u7684\u91cc\u7a0b\u7891\u7891\u6587\u2014\u2014\u3010\u53f8\u6cd5\u9662\u91cb\u5b57\u7b2c 443 \u865f\u89e3\u91cb\u3011\uff01\u91cb\u5b57 443 \u865f\u5c07\u6cd5\u5f8b\u4fdd\u7559\u5283\u5206\u70ba\u56db\u5927\u5c64\u7d1a\uff1a\\n\u7b2c\u4e00\u5c64\u662f\u300c\u61b2\u6cd5\u4fdd\u7559\u300d\uff1a\u4f8b\u5982\u61b2\u6cd5\u7b2c 8 \u689d\u7684\u4eba\u8eab\u81ea\u7531\u8207\u63d0\u5be9\u4fdd\u969c\uff0c\u5fc5\u9808\u7531\u61b2\u6cd5\u6216\u570b\u6703\u6cd5\u5f8b\u56b4\u683c\u89aa\u81ea\u5236\u5b9a\uff0c\u7d55\u4e0d\u5141\u8a31\u884c\u653f\u6a5f\u95dc\u4ee5\u547d\u4ee4\u4ee3\u4e4b\uff01\\n\u7b2c\u4e8c\u5c64\u662f\u300c\u7d55\u5c0d\u6cd5\u5f8b\u4fdd\u7559\u300d\uff1a\u6d89\u53ca\u525d\u596a\u4eba\u6c11\u751f\u547d\u6216\u9650\u5236\u8eab\u9ad4\u81ea\u7531\u4e4b\u5211\u7f70\u3001\u5f37\u5236\u7ba1\u675f\u7b49\u4e8b\u9805\uff0c\u5fc5\u9808\u7531\u7acb\u6cd5\u9662\u89aa\u81ea\u901a\u904e\u6cd5\u5f8b\u5b9a\u4e4b\uff01\\n\u7b2c\u4e09\u5c64\u662f\u300c\u76f8\u5c0d\u6cd5\u5f8b\u4fdd\u7559\u300d\uff1a\u6d89\u53ca\u8ab2\u5fb5\u7a05\u6350\u3001\u884c\u653f\u7f70\u88c1\u7f70\u3001\u71df\u696d\u9650\u5236\u7b49\u91cd\u5927\u8ca1\u7522\u6216\u81ea\u7531\u6b0a\u5229\uff0c\u5f97\u5728\u6cd5\u5f8b\u6388\u6b0a\u660e\u78ba\u7684\u524d\u63d0\u4e0b\uff0c\u7531\u884c\u653f\u6a5f\u95dc\u8a02\u5b9a\u6cd5\u898f\u547d\u4ee4\uff01\\n\u7b2c\u56db\u5c64\u5247\u662f\u300c\u57f7\u884c\u6027\u8207\u7d30\u7bc0\u6027\u898f\u5b9a\u300d\uff1a\u884c\u653f\u6a5f\u95dc\u5f97\u57fa\u65bc\u8077\u6b0a\u8a02\u5b9a\u5167\u90e8\u884c\u653f\u898f\u5247\u3002\\n\\n\u540c\u5b78\u5011\u5728\u89e3\u984c\u6642\uff0c\u53ea\u8981\u770b\u5230\u884c\u653f\u6a5f\u95dc\u672a\u7372\u6cd5\u5f8b\u660e\u78ba\u6388\u6b0a\uff0c\u5c31\u64c5\u81ea\u767c\u5e03\u81ea\u8a2d\u7f70\u5247\u7684\u4ee4\u51fd\u9650\u5236\u4eba\u6c11\uff0c\u76f4\u63a5\u679c\u65b7\u5224\u5b9a\u8a72\u884c\u653f\u884c\u70ba\u9055\u6cd5\uff01\", \"3\": \"\u3010\u4e3b\u6301\u4eba \u5c0e\u5e2b\u3011\uff1a\u7dca\u63a5\u8457\u6211\u5011\u4f86\u5230\u7b2c\u4e09\u55ae\u5143\u3010Module 3\uff1a\u4e00\u822c\u6cd5\u5f8b\u539f\u5247\uff08\u4e00\uff09\uff1a\u5e73\u7b49\u539f\u5247\u8207\u6bd4\u4f8b\u539f\u5247\u3011\u3002\\n\\n\u5728\u884c\u653f\u6cd5\u4e2d\uff0c\u6210\u6587\u6cd5\u898f\u4e0d\u53ef\u80fd\u7aae\u76e1\u4e16\u9593\u6240\u6709\u7684\u793e\u6703\u8b8a\u5316\uff0c\u56e0\u6b64\u300c\u4e0d\u6210\u6587\u7684\u4e00\u822c\u6cd5\u5f8b\u539f\u5247\u300d\u5c31\u6210\u70ba\u6cd5\u9662\u5be9\u67e5\u8207\u884c\u653f\u88c1\u91cf\u7684\u9ec3\u91d1\u904e\u78c5\u79e4\uff01\\n\\n\u9996\u5148\u662f\u300a\u884c\u653f\u7a0b\u5e8f\u6cd5\u300b\u7b2c 6 \u689d\u7684\u300c\u5e73\u7b49\u539f\u5247\u300d\uff1a\u300c\u884c\u653f\u884c\u70ba\uff0c\u975e\u6709\u6b63\u7576\u7406\u7531\uff0c\u4e0d\u5f97\u70ba\u5dee\u5225\u5f85\u9047\u3002\u300d\u9019\u88e1\u8981\u63d0\u9192\u5927\u5bb6\u5927\u8003\u5e38\u898b\u9677\u9631\uff1a\u5e73\u7b49\u539f\u5247\u4fdd\u969c\u7684\u662f\u300c\u5be6\u8cea\u5e73\u7b49\u300d\u800c\u975e\u55ae\u7d14\u5b57\u9762\u4e0a\u7684\u7d55\u5c0d\u5f62\u5f0f\u5e73\u7b49\uff01\u53ea\u8981\u6709\u5408\u7406\u5408\u7406\u7684\u6b63\u7576\u7406\u7531\uff08\u4f8b\u5982\u7167\u9867\u5f31\u52e2\u3001\u6276\u52a9\u8ca7\u56f0\uff09\uff0c\u5dee\u5225\u5f85\u9047\u5c31\u662f\u5408\u61b2\u4e14\u5408\u6cd5\u7684\u3002\u6b64\u5916\uff0c\u5be6\u52d9\u4e0a\u8457\u540d\u5fc3\u6cd5\uff1a\u300c\u9055\u6cd5\u8005\u4e0d\u5f97\u4e3b\u5f35\u9055\u6cd5\u4e4b\u5e73\u7b49\uff01\u300d\u5982\u679c\u5225\u4eba\u9055\u898f\u6c92\u88ab\u6293\uff0c\u4f60\u9055\u898f\u88ab\u958b\u7f70\uff0c\u4f60\u4e0d\u80fd\u5728\u6cd5\u5ead\u4e0a\u4e3b\u5f35\u300c\u5225\u4eba\u6c92\u88ab\u7f70\u6240\u4ee5\u6211\u4e5f\u4e0d\u80fd\u88ab\u7f70\u300d\uff0c\u56e0\u70ba\u9055\u6cd5\u884c\u70ba\u4e0d\u5b58\u5728\u5e73\u7b49\u4fdd\u8b77\uff01\\n\\n\u518d\u4f86\u662f\u61b2\u6cd5\u8207\u884c\u653f\u6cd5\u4e2d\u6700\u91cd\u8981\u7684\u5927\u5e1d\u738b\u689d\u6b3e\u2014\u2014\u300a\u884c\u653f\u7a0b\u5e8f\u6cd5\u300b\u7b2c 7 \u689d\u7684\u300c\u6bd4\u4f8b\u539f\u5247\u300d\uff01\u6bd4\u4f8b\u539f\u5247\u5305\u542b\u4e09\u5927\u5b50\u539f\u5247\uff0c\u5be9\u67e5\u9806\u5e8f\u7d55\u5c0d\u4e0d\u80fd\u932f\uff1a\\n\u4e00\u3001\u300c\u9069\u7576\u6027\u539f\u5247\uff08\u9069\u5408\u6027\uff09\u300d\uff1a\u884c\u653f\u6a5f\u95dc\u63a1\u53d6\u7684\u624b\u6bb5\uff0c\u5fc5\u9808\u80fd\u5920\u300c\u6709\u52a9\u65bc\u300d\u884c\u653f\u76ee\u7684\u4e4b\u9054\u6210\u3002\u5982\u679c\u624b\u6bb5\u6839\u672c\u7121\u6cd5\u9054\u5230\u76ee\u7684\uff0c\u7b2c\u4e00\u95dc\u5c31\u51fa\u5c40\uff01\\n\u4e8c\u3001\u300c\u5fc5\u8981\u6027\u539f\u5247\uff08\u6700\u5c0f\u4fb5\u5bb3\u6027\uff09\u300d\uff1a\u5728\u6240\u6709\u80fd\u5920\u9054\u6210\u76ee\u7684\u7684\u591a\u7a2e\u6709\u6548\u624b\u6bb5\u4e2d\uff0c\u884c\u653f\u6a5f\u95dc\u5fc5\u9808\u9078\u64c7\u300c\u5c0d\u4eba\u6c11\u6b0a\u76ca\u4fb5\u5bb3\u6700\u5c0f\u300d\u7684\u90a3\u4e00\u500b\u624b\u6bb5\uff01\\n\u4e09\u3001\u300c\u72f9\u7fa9\u6bd4\u4f8b\u539f\u5247\uff08\u904e\u78c5\u8861\u91cf\u539f\u5247\uff09\u300d\uff1a\u624b\u6bb5\u6240\u9020\u6210\u7684\u640d\u5bb3\uff0c\u4e0d\u5f97\u8207\u6b32\u9054\u6210\u4e4b\u884c\u653f\u76ee\u7684\u986f\u5931\u5747\u8861\uff01\u63db\u8a00\u4e4b\uff0c\u4e0d\u80fd\u70ba\u4e86\u8d95\u8d70\u4e00\u96bb\u868a\u5b50\u800c\u7528\u5927\u7832\u70b8\u6bc0\u6574\u68df\u623f\u5b50\uff01\\n\\n\u9019\u4e09\u5927\u5b50\u539f\u5247\u5728\u81fa\u7063\u65b0\u805e\u500b\u6848\uff08\u4f8b\u5982\u75ab\u60c5\u9694\u96e2\u7ba1\u5236\u3001\u74b0\u5883\u7a3d\u67e5\u52d2\u4ee4\u505c\u696d\u3001\u9055\u898f\u88c1\u7f70\uff09\u4e2d\u7121\u8655\u4e0d\u5728\uff0c\u662f\u5927\u8003\u7d20\u990a\u984c\u6700\u71b1\u9580\u7684\u5206\u6790\u5de5\u5177\uff01\", \"4\": \"\u3010\u4e3b\u6301\u4eba \u5c0e\u5e2b\u3011\uff1a\u6b61\u8fce\u6536\u807d\u7b2c\u56db\u55ae\u5143\u3010Module 4\uff1a\u4e00\u822c\u6cd5\u5f8b\u539f\u5247\uff08\u4e8c\uff09\uff1a\u4fe1\u8cf4\u4fdd\u8b77\u3001\u8aa0\u4fe1\u539f\u5247\u8207\u88c1\u91cf\u63a7\u5236\u3011\u3002\\n\\n\u7576\u884c\u653f\u6a5f\u95dc\u505a\u51fa\u4e00\u500b\u5c0d\u4eba\u6c11\u6709\u5229\u7684\u884c\u653f\u8655\u5206\u5f8c\uff0c\u80fd\u4e0d\u80fd\u96a8\u610f\u8aaa\u5ee2\u6b62\u5c31\u5ee2\u6b62\uff1f\u9019\u5c31\u727d\u6d89\u5230\u300a\u884c\u653f\u7a0b\u5e8f\u6cd5\u300b\u7b2c 8 \u689d\u898f\u5b9a\u7684\u300c\u4fe1\u8cf4\u4fdd\u8b77\u539f\u5247\u300d\uff01\\n\u4e3b\u5f35\u4fe1\u8cf4\u4fdd\u8b77\u5fc5\u9808\u540c\u6642\u5177\u5099\u4e09\u5927\u8981\u4ef6\uff0c\u7f3a\u4e00\u4e0d\u53ef\uff1a\\n1. \u300c\u4fe1\u8cf4\u57fa\u790e\u300d\uff1a\u5fc5\u9808\u6709\u4e00\u500b\u4ee3\u8868\u570b\u5bb6\u610f\u5fd7\u7684\u5408\u6cd5\u6216\u9055\u6cd5\u884c\u653f\u8655\u5206\u5b58\u5728\uff1b\\n2. \u300c\u4fe1\u8cf4\u8868\u73fe\u300d\uff1a\u4eba\u6c11\u57fa\u65bc\u5c0d\u8a72\u8655\u5206\u7684\u4fe1\u4efb\uff0c\u5df2\u7d93\u4ed8\u8af8\u5177\u9ad4\u7684\u7d93\u6fdf\u6216\u6cd5\u5f8b\u884c\u70ba\uff08\u4f8b\u5982\u6295\u5165\u8cc7\u91d1\u5efa\u5ee0\u3001\u8cfc\u8cb7\u8a2d\u5099\uff09\uff1b\\n3. \u300c\u4fe1\u8cf4\u503c\u5f97\u4fdd\u8b77\u300d\uff1a\u4eba\u6c11\u5fc5\u9808\u6c92\u6709\u8a50\u6b3a\u3001\u8105\u8feb\u6216\u660e\u77e5\u8655\u5206\u9055\u6cd5\u7b49\u4e0d\u503c\u5f97\u4fdd\u8b77\u4e4b\u60c5\u4e8b\uff01\\n\u5982\u679c\u5177\u5099\u9019\u4e09\u5927\u8981\u4ef6\uff0c\u5373\u4fbf\u6a5f\u95dc\u672a\u4f86\u56e0\u516c\u76ca\u8003\u91cf\u6b32\u64a4\u92b7\u8a72\u8655\u5206\uff0c\u4e5f\u5fc5\u9808\u7d66\u4e88\u4eba\u6c11\u5408\u7406\u7684\u91d1\u9322\u88dc\u511f\u6216\u904e\u6e21\u689d\u6b3e\uff01\\n\\n\u53e6\u5916\uff0c\u95dc\u65bc\u884c\u653f\u6a5f\u95dc\u7684\u300c\u88c1\u91cf\u6b0a\u63a7\u5236\u300d\uff0c\u6cd5\u5f8b\u6388\u6b0a\u6a5f\u95dc\u5728\u4e00\u5b9a\u7bc4\u570d\u5167\u5f97\u81ea\u7531\u9078\u64c7\u88c1\u7f70\u91d1\u984d\u6216\u8655\u5206\u65b9\u5f0f\uff0c\u4f46\u81ea\u7531\u88c1\u91cf\u7d55\u5c0d\u4e0d\u662f\u7121\u9650\u81a8\u8139\u7684\u9738\u6b0a\uff01\u4f9d\u64da\u300a\u884c\u653f\u7a0b\u5e8f\u6cd5\u300b\u7b2c 10 \u689d\uff0c\u88c1\u91cf\u6b0a\u53d7\u5230\u4e09\u5927\u9055\u6cd5\u5f62\u614b\u7684\u5be9\u67e5\uff1a\\n\u4e00\u3001\u300c\u88c1\u91cf\u903e\u8d8a\u300d\uff1a\u88c1\u91cf\u7d50\u679c\u8d85\u904e\u4e86\u6cd5\u5f8b\u6388\u6b0a\u7684\u4e0a\u4e0b\u9650\u91d1\u984d\uff08\u4f8b\u5982\u6cd5\u5f8b\u898f\u5b9a\u7f70 1 \u81f3 5 \u842c\uff0c\u6a5f\u95dc\u537b\u958b\u7f70 10 \u842c\uff09\uff1b\\n\u4e8c\u3001\u300c\u88c1\u91cf\u6feb\u7528\u300d\uff1a\u88c1\u91cf\u8003\u91cf\u4e86\u8207\u6cd5\u898f\u76ee\u7684\u7121\u95dc\u7684\u56e0\u7d20\uff08\u4f8b\u5982\u56e0\u500b\u4eba\u597d\u60e1\u6216\u653f\u6cbb\u7acb\u5834\u800c\u52a0\u91cd\u8655\u7f70\uff09\uff1b\\n\u4e09\u3001\u300c\u88c1\u91cf\u6020\u60f0\u300d\uff1a\u6cd5\u5f8b\u6388\u6b0a\u6a5f\u95dc\u5f97\u5f48\u6027\u88c1\u91cf\uff0c\u6a5f\u95dc\u537b\u4e00\u5f8b\u786c\u6027\u898f\u5b9a\u300c\u51e1\u9055\u898f\u8005\u4e00\u5f8b\u958b\u7f70\u4e0a\u9650\u300d\uff0c\u62d2\u7d55\u5728\u500b\u6848\u4e2d\u9032\u884c\u8003\u91cf\uff01\\n\u9019\u4e09\u5927\u88c1\u91cf\u7455\u75b5\u5728\u884c\u653f\u8a34\u8a1f\u4e2d\uff0c\u4e00\u5f8b\u6703\u88ab\u884c\u653f\u6cd5\u9662\u8a8d\u5b9a\u70ba\u9055\u6cd5\u800c\u4e88\u4ee5\u64a4\u92b7\uff01\", \"5\": \"\u3010\u4e3b\u6301\u4eba \u5c0e\u5e2b\u3011\uff1a\u5927\u5bb6\u6536\u807d\u904e\u534a\u4e86\uff0c\u73fe\u5728\u6211\u5011\u9032\u5165\u5168\u66f8\u6700\u5177\u6838\u5fc3\u5be6\u6230\u50f9\u503c\u7684\u7b2c\u4e94\u55ae\u5143\u3010Module 5\uff1a\u884c\u653f\u884c\u70ba\u614b\u6a23\uff08\u4e00\uff09\uff1a\u884c\u653f\u8655\u5206\u5168\u89e3\u8207\u5be6\u52d9\u6848\u4f8b\u3011\uff01\\n\\n\u5728\u884c\u653f\u6cd5\u5927\u8003\u8207\u5be6\u52d9\u6551\u6fdf\u4e2d\uff0c\u7b2c\u4e00\u6b65\u6c38\u9060\u662f\u5224\u65b7\uff1a\u300c\u9019\u7a76\u7adf\u662f\u4e0d\u662f\u4e00\u500b\u884c\u653f\u8655\u5206\uff1f\u300d\u56e0\u70ba\u53ea\u6709\u884c\u653f\u8655\u5206\uff0c\u4eba\u6c11\u624d\u80fd\u5728 30 \u65e5\u5167\u63d0\u8d77\u8a34\u9858\uff01\\n\u8acb\u5927\u5bb6\u7262\u8a18\u300a\u884c\u653f\u7a0b\u5e8f\u6cd5\u300b\u7b2c 92 \u689d\u300c\u884c\u653f\u8655\u5206\u9ec3\u91d1\u516d\u5927\u69cb\u6210\u8981\u4ef6\u300d\uff1a\\n\u4e00\u3001\u300c\u884c\u653f\u6a5f\u95dc\u300d\uff1a\u51fa\u65bc\u4ee3\u8868\u570b\u5bb6\u516c\u6b0a\u529b\u4e4b\u653f\u5e9c\u7d44\u7e54\u6216\u53d7\u8a17\u884c\u4f7f\u516c\u6b0a\u529b\u8005\uff1b\\n\u4e8c\u3001\u300c\u516c\u6cd5\u4e8b\u4ef6\u300d\uff1a\u57fa\u65bc\u516c\u6cd5\u6cd5\u898f\u884c\u4f7f\u8077\u6b0a\uff1b\\n\u4e09\u3001\u300c\u55ae\u65b9\u884c\u70ba\u300d\uff1a\u6a5f\u95dc\u55ae\u65b9\u9762\u4f5c\u6c7a\u5b9a\uff0c\u7121\u9700\u76f8\u5c0d\u4eba\u540c\u610f\uff1b\\n\u56db\u3001\u300c\u5177\u9ad4\u8655\u7f6e\u300d\uff1a\u91dd\u5c0d\u7279\u5b9a\u4eba\u6216\u7279\u5b9a\u53ef\u5f97\u78ba\u5b9a\u4e4b\u4e8b\u4ef6\uff1b\\n\u4e94\u3001\u300c\u5c0d\u5916\u76f4\u63a5\u300d\uff1a\u76f4\u63a5\u5c0d\u6a5f\u95dc\u5167\u90e8\u9ad4\u7cfb\u4ee5\u5916\u4e4b\u4eba\u6c11\u7522\u751f\u6cd5\u6548\uff08\u975e\u6a5f\u95dc\u5167\u90e8\u6307\u4ee4\uff09\uff1b\\n\u516d\u3001\u300c\u7522\u751f\u6cd5\u5f8b\u6548\u679c\u300d\uff1a\u8a2d\u5b9a\u3001\u8b8a\u66f4\u6216\u5ee2\u6b62\u4eba\u6c11\u4e4b\u6b0a\u5229\u7fa9\u52d9\u95dc\u4fc2\uff01\\n\\n\u51e1\u662f\u540c\u6642\u7b26\u5408\u9019\u516d\u5927\u8981\u4ef6\u7684\u884c\u70ba\uff08\u4f8b\u5982\u4ea4\u901a\u7f70\u55ae\u3001\u74b0\u4fdd\u52d2\u4ee4\u505c\u696d\u3001\u5efa\u7bc9\u57f7\u7167\u6838\u767c\u6216\u5ee2\u6b62\uff09\uff0c\u5c31\u662f\u6a19\u6e96\u7684\u884c\u653f\u8655\u5206\uff01\\n\\n\u5982\u679c\u884c\u653f\u8655\u5206\u6709\u7455\u75b5\uff0c\u8a72\u5982\u4f55\u8655\u7406\uff1f\\n\u4f9d\u64da\u300a\u884c\u653f\u7a0b\u5e8f\u6cd5\u300b\u7b2c 111 \u689d\uff0c\u82e5\u8655\u5206\u5177\u6709\u300c\u91cd\u5927\u660e\u986f\u7455\u75b5\u300d\uff08\u4f8b\u5982\u7f3a\u4e4f\u6b0a\u9650\u3001\u5ba2\u89c0\u4e0a\u4e0d\u80fd\u5be6\u73fe\u3001\u9055\u80cc\u516c\u5171\u79e9\u5e8f\uff09\uff0c\u8a72\u8655\u5206\u5c6c\u65bc\u300c\u81ea\u59cb\u7121\u6548\u300d\uff0c\u4eba\u6c11\u96a8\u6642\u5f97\u63d0\u8d77\u78ba\u8a8d\u8655\u5206\u7121\u6548\u8a34\u8a1f\uff01\\n\u800c\u82e5\u8655\u5206\u50c5\u4fc2\u4e00\u822c\u9055\u6cd5\uff08\u4f8b\u5982\u88c1\u91cf\u7455\u75b5\u3001\u9055\u53cd\u6bd4\u4f8b\u539f\u5247\uff09\uff0c\u4f9d\u64da\u7b2c 117 \u689d\uff0c\u8a72\u8655\u5206\u5728\u672a\u7d93\u64a4\u92b7\u524d\u539f\u5247\u4e0a\u4ecd\u6709\u6548\uff0c\u4f46\u539f\u8655\u5206\u6a5f\u95dc\u6216\u4e0a\u7d1a\u6a5f\u95dc\u5f97\u4f9d\u8077\u6b0a\u4e88\u4ee5\u64a4\u92b7\uff0c\u4eba\u6c11\u4ea6\u5f97\u65bc 30 \u65e5\u4e0d\u8b8a\u671f\u9593\u5167\u63d0\u8d77\u8a34\u9858\u53ca\u64a4\u92b7\u8a34\u8a1f\u6551\u6fdf\uff01\", \"6\": \"\u3010\u4e3b\u6301\u4eba \u5c0e\u5e2b\u3011\uff1a\u6b61\u8fce\u4f86\u5230\u7b2c\u516d\u55ae\u5143\u3010Module 6\uff1a\u884c\u653f\u884c\u70ba\u614b\u6a23\uff08\u4e8c\uff09\uff1a\u884c\u653f\u5951\u7d04\u3001\u4e8b\u5be6\u884c\u70ba\u3001\u6307\u5c0e\u8207\u884c\u653f\u7acb\u6cd5\u3011\u3002\\n\\n\u9664\u4e86\u55ae\u65b9\u7684\u884c\u653f\u8655\u5206\u5916\uff0c\u73fe\u4ee3\u884c\u653f\u6a5f\u95dc\u8d8a\u4f86\u8d8a\u5e38\u63a1\u7528\u300c\u96d9\u65b9\u5408\u610f\u300d\u7684\u300c\u884c\u653f\u5951\u7d04\u300d\u4f86\u9054\u6210\u884c\u653f\u76ee\u7684\u3002\\n\u4f9d\u64da\u300a\u884c\u653f\u7a0b\u5e8f\u6cd5\u300b\u7b2c 135 \u689d\uff0c\u516c\u6cd5\u4e0a\u6cd5\u5f8b\u95dc\u4fc2\u5f97\u4ee5\u5951\u7d04\u8a2d\u5b9a\u3001\u8b8a\u66f4\u6216\u6d88\u6ec5\u3002\u4f8b\u5982\uff1a\u516c\u8cbb\u91ab\u5b78\u751f\u7c3d\u7f72\u4e4b\u670d\u52d9\u5951\u7d04\u3001\u5168\u6c11\u5065\u4fdd\u7279\u7d04\u91ab\u9662\u5408\u7d04\u7b49\uff0c\u5747\u5c6c\u65bc\u516c\u6cd5\u4e0a\u7684\u884c\u653f\u5951\u7d04\u3002\u82e5\u767c\u751f\u5c65\u7d04\u722d\u8b70\uff0c\u7576\u4e8b\u4eba\u61c9\u63d0\u8d77\u300c\u4e00\u822c\u7d66\u4ed8\u8a34\u8a1f\u300d\u6216\u300c\u884c\u653f\u5951\u7d04\u722d\u8b70\u8a34\u8a1f\u300d\uff0c\u800c\u975e\u63d0\u8d77\u8a34\u9858\uff01\\n\\n\u53e6\u5916\uff0c\u5927\u5bb6\u7d93\u5e38\u5bb9\u6613\u6df7\u6dc6\u300c\u884c\u653f\u6307\u5c0e\u300d\u8207\u300c\u7d14\u7cb9\u4e8b\u5be6\u884c\u70ba\u300d\uff1a\\n\u4f9d\u64da\u7b2c 165 \u689d\uff0c\u300c\u884c\u653f\u6307\u5c0e\u300d\u4fc2\u6307\u884c\u653f\u6a5f\u95dc\u65bc\u5176\u8077\u6b0a\u6216\u6240\u7ba1\u884c\u653f\u4e8b\u9805\u5167\uff0c\u70ba\u4fc3\u9032\u4e00\u5b9a\u884c\u653f\u76ee\u7684\uff0c\u4ee5\u8f14\u5c0e\u3001\u52f8\u544a\u3001\u5efa\u8b70\u7b49\u4e0d\u5177\u6cd5\u5f8b\u5f37\u5236\u529b\u4e4b\u65b9\u5f0f\uff0c\u8981\u6c42\u76f8\u5c0d\u4eba\u70ba\u4e00\u5b9a\u63a1\u53d6\u6216\u4e0d\u63a1\u53d6\u884c\u70ba\u3002\u91cd\u9ede\u662f\uff1a\u884c\u653f\u6307\u5c0e\u300c\u4e0d\u5177\u6cd5\u5f8b\u5f37\u5236\u529b\u300d\uff0c\u76f8\u5c0d\u4eba\u5f97\u660e\u78ba\u62d2\u7d55\uff0c\u6a5f\u95dc\u7d55\u4e0d\u5f97\u56e0\u4eba\u6c11\u62d2\u7d55\u6307\u5c0e\u800c\u7d66\u4e88\u4e0d\u5229\u4e4b\u8655\u5206\uff01\\n\\n\u81f3\u65bc\u300c\u7d14\u7cb9\u4e8b\u5be6\u884c\u70ba\u300d\uff0c\u4f8b\u5982\u8b66\u5bdf\u5728\u8def\u53e3\u6307\u63ee\u4ea4\u901a\u3001\u6e05\u6f54\u968a\u904b\u9001\u5783\u573e\u3001\u6a5f\u95dc\u4fee\u7e55\u8def\u9762\u5751\u6d1e\u6216\u767c\u5e03\u6c23\u8c61\u9810\u5831\uff0c\u9019\u4e9b\u884c\u70ba\u96d6\u7136\u4e0d\u76f4\u63a5\u8a2d\u5b9a\u6cd5\u5f8b\u6548\u679c\uff0c\u4f46\u82e5\u56e0\u7ba1\u7406\u6b20\u7f3a\u6216\u9055\u6cd5\u904e\u5931\u50b7\u53ca\u4eba\u6c11\uff0c\u4eba\u6c11\u5f97\u4f9d\u300a\u570b\u5bb6\u8ce0\u511f\u6cd5\u300b\u8acb\u6c42\u570b\u5bb6\u8ce0\u511f\uff01\", \"7\": \"\u3010\u4e3b\u6301\u4eba \u5c0e\u5e2b\u3011\uff1a\u73fe\u5728\u6211\u5011\u9032\u5165\u7b2c\u4e03\u55ae\u5143\u3010Module 7\uff1a\u884c\u653f\u5236\u88c1\uff1a\u884c\u653f\u7f70\u6cd5\u539f\u7406\u8207\u65b0\u805e\u771f\u5be6\u88c1\u7f70\u3011\u3002\u9019\u662f\u81fa\u7063\u65b0\u805e\u5831\u5c0e\u4e2d\u51fa\u73fe\u983b\u7387\u6700\u9ad8\u7684\u884c\u653f\u6cd5\u4e3b\u984c\uff01\\n\\n\u7576\u4eba\u6c11\u9055\u6cd5\u6642\uff0c\u884c\u653f\u6a5f\u95dc\u958b\u51fa\u7f70\u9370\u3001\u6c92\u6536\u3001\u540a\u6263\u57f7\u7167\u6216\u52d2\u4ee4\u505c\u696d\uff0c\u9019\u4e9b\u5c6c\u65bc\u884c\u653f\u5236\u88c1\uff0c\u4e00\u5f8b\u9069\u7528\u300a\u884c\u653f\u7f70\u6cd5\u300b\uff01\\n\u884c\u653f\u7f70\u7684\u9996\u8981\u9435\u5f8b\u662f\u300c\u884c\u653f\u7f70\u6cd5\u5b9a\u539f\u5247\u300d\uff1a\u884c\u70ba\u4e4b\u8655\u7f70\uff0c\u4ee5\u884c\u70ba\u6642\u4e4b\u6cd5\u5f8b\u6216\u6cd5\u898f\u547d\u4ee4\u6709\u660e\u6587\u898f\u5b9a\u8005\u70ba\u9650\uff01\\n\\n\u7b2c\u4e8c\uff0c\u95dc\u65bc\u4e3b\u89c0\u6b78\u8cac\u8981\u4ef6\uff0c\u8acb\u5927\u5bb6\u7279\u5225\u6ce8\u610f\u300a\u884c\u653f\u7f70\u6cd5\u300b\u7b2c 7 \u689d\u7b2c 1 \u9805\uff1a\u300c\u9055\u53cd\u884c\u653f\u6cd5\u4e0a\u7fa9\u52d9\u4e4b\u884c\u70ba\u975e\u51fa\u65bc\u6545\u610f\u6216\u904e\u5931\u8005\uff0c\u4e0d\u4e88\u8655\u7f70\u3002\u300d\u81fa\u7063\u6cd5\u5f8b\u65e9\u5df2\u5ee2\u9664\u904e\u53bb\u300c\u63a8\u5b9a\u904e\u5931\u300d\u6216\u300c\u7121\u904e\u5931\u8cac\u4efb\u300d\u7684\u820a\u5236\u5ea6\uff01\u884c\u653f\u6a5f\u95dc\u6b32\u5c0d\u4eba\u6c11\u9032\u884c\u884c\u653f\u88c1\u7f70\uff0c\u6a5f\u95dc\u8ca0\u6709\u8209\u8b49\u8cac\u4efb\uff0c\u5fc5\u9808\u8b49\u660e\u4eba\u6c11\u5177\u6709\u300c\u6545\u610f\u300d\u6216\u300c\u904e\u5931\u300d\u624d\u80fd\u958b\u7f70\uff01\\n\\n\u7b2c\u4e09\uff0c\u5927\u8003\u6700\u9707\u64bc\u7684\u8003\u9ede\u2014\u2014\u300a\u884c\u653f\u7f70\u6cd5\u300b\u7b2c 24 \u689d\u300c\u4e00\u884c\u70ba\u4e0d\u4e8c\u7f70\u539f\u5247\uff08\u4e00\u4e8b\u4e0d\u4e8c\u7f70\uff09\u300d\uff01\\n\u5982\u679c\u4eba\u6c11\u7684\u4e00\u500b\u9055\u6cd5\u884c\u70ba\uff0c\u540c\u6642\u9055\u53cd\u4e86\u5211\u6cd5\u8207\u884c\u653f\u7f70\u6cd5\uff08\u4f8b\u5982\u9152\u5f8c\u99d5\u8eca\uff0c\u540c\u6642\u89f8\u72af\u5211\u6cd5\u516c\u5171\u5371\u96aa\u7f6a\u8207\u9053\u8def\u4ea4\u901a\u7ba1\u7406\u8655\u7f70\u689d\u4f8b\uff09\uff0c\u539f\u5247\u4e0a\u63a1\u53d6\u300c\u5211\u4e8b\u512a\u5148\u539f\u5247\u300d\uff01\u61c9\u5148\u7531\u53f8\u6cd5\u6a5f\u95dc\u4f9d\u5211\u6cd5\u8655\u7f70\uff1b\u53ea\u6709\u5728\u5211\u4e8b\u8a34\u8a1f\u7372\u5f97\u4e0d\u8d77\u8a34\u8655\u5206\u3001\u7de9\u8d77\u8a34\u8655\u5206\u6216\u7121\u7f6a\u5224\u6c7a\u78ba\u5b9a\u5f8c\uff0c\u884c\u653f\u6a5f\u95dc\u59cb\u5f97\u88c1\u8655\u884c\u653f\u7f70\u9370\u3002\u4e14\u82e5\u6cd5\u9662\u5224\u8655\u7f70\u91d1\uff0c\u884c\u653f\u7f70\u9370\u5df2\u7e73\u7d0d\u8005\u61c9\u4e88\u4ee5\u6263\u62b5\uff01\u9019\u500b\u89c0\u5ff5\u5728\u5927\u8003\u7d20\u990a\u9078\u64c7\u984c\u4e2d\u5e7e\u4e4e\u6bcf\u5e74\u5fc5\u8003\uff01\", \"8\": \"\u3010\u4e3b\u6301\u4eba \u5c0e\u5e2b\u3011\uff1a\u6536\u807d\u4f86\u5230\u7b2c 21 \u5206\u9418\uff0c\u6211\u5011\u9032\u5165\u7b2c\u516b\u55ae\u5143\u3010Module 8\uff1a\u884c\u653f\u57f7\u884c\u6cd5\u8207\u5373\u6642\u5f37\u5236\u3011\u3002\\n\\n\u7576\u884c\u653f\u6a5f\u95dc\u958b\u51fa\u5408\u6cd5\u7684\u884c\u653f\u8655\u5206\u5f8c\uff0c\u5982\u679c\u4eba\u6c11\u8cf4\u76ae\u4e0d\u5c65\u884c\uff0c\u570b\u5bb6\u8a72\u5982\u4f55\u767c\u63ee\u516c\u6b0a\u529b\u7684\u5f37\u5236\u529b\uff1f\u9019\u6642\u5019\u767b\u5834\u7684\u5c31\u662f\u300a\u884c\u653f\u57f7\u884c\u6cd5\u300b\uff01\\n\u884c\u653f\u57f7\u884c\u5206\u70ba\u4e09\u5927\u9ad4\u7cfb\uff1a\\n\\n\u7b2c\u4e00\u3001\u300c\u516c\u6cd5\u4e0a\u91d1\u9322\u7d66\u4ed8\u7fa9\u52d9\u4e4b\u57f7\u884c\u300d\uff1a\u4f8b\u5982\u4eba\u6c11\u6b20\u7e73\u7a05\u6b3e\u3001\u884c\u653f\u7f70\u9370\u6216\u5168\u6c11\u5065\u4fdd\u8cbb\u3002\u539f\u8655\u5206\u6a5f\u95dc\u5f97\u79fb\u9001\u6cd5\u52d9\u90e8\u884c\u653f\u57f7\u884c\u7f72\u5404\u5206\u7f72\uff0c\u7531\u57f7\u884c\u5b98\u4f9d\u6cd5\u6263\u62bc\u85aa\u8cc7\u3001\u67e5\u5c01\u4e0d\u52d5\u7522\u6216\u5be6\u65bd\u9650\u5236\u51fa\u5883\u3001\u8072\u8acb\u62d8\u63d0\u7ba1\u6536\uff01\\n\\n\u7b2c\u4e8c\u3001\u300c\u884c\u70ba\u6216\u4e0d\u884c\u70ba\u7fa9\u52d9\u4e4b\u57f7\u884c\u300d\uff1a\u7576\u4eba\u6c11\u4f9d\u6cd5\u8ca0\u6709\u4e00\u5b9a\u884c\u70ba\u7fa9\u52d9\uff08\u4f8b\u5982\u62c6\u9664\u9055\u7ae0\u5efa\u7bc9\uff09\u537b\u4e0d\u5c65\u884c\u6642\uff0c\u6a5f\u95dc\u5f97\u63a1\u7528\u300c\u4ee3\u5c65\u884c\u300d\uff08\u7531\u6a5f\u95dc\u6216\u7b2c\u4e09\u65b9\u4ee3\u70ba\u62c6\u9664\u4e26\u5411\u4eba\u6c11\u6536\u53d6\u8cbb\u7528\uff09\uff0c\u6216\u88c1\u8655\u300c\u6020\u91d1\u300d\uff08\u9023\u7e8c\u8655\u4ee5\u91d1\u9322\u7f70\u76f4\u81f3\u5c65\u884c\u70ba\u6b62\uff09\u4f86\u9593\u63a5\u5f37\u5236\uff01\\n\\n\u7b2c\u4e09\uff0c\u5927\u8003\u6975\u6613\u8207\u884c\u653f\u7f70\u6df7\u6dc6\u7684\u2014\u2014\u300c\u5373\u6642\u5f37\u5236\u300d\uff01\\n\u300a\u884c\u653f\u57f7\u884c\u6cd5\u300b\u7b2c 36 \u689d\u898f\u5b9a\u7684\u300c\u5373\u6642\u5f37\u5236\u300d\uff0c\u4fc2\u56e0\u767c\u751f\u72c2\u66b4\u3001\u9189\u9152\u3001\u50b3\u67d3\u75c5\u6216\u7dca\u6025\u5371\u96e3\uff0c\u70ba\u4e86\u963b\u6b62\u5373\u5c07\u767c\u751f\u7684\u6025\u8feb\u5371\u96aa\uff0c\u6a5f\u95dc\u4e0d\u4ee5\u4eba\u6c11\u4e8b\u5148\u8ca0\u6709\u7fa9\u52d9\u70ba\u524d\u63d0\uff0c\u76f4\u63a5\u5c0d\u4eba\u6c11\u4e4b\u8eab\u9ad4\u5be6\u65bd\u7ba1\u675f\u3001\u5c0d\u7269\u54c1\u5be6\u65bd\u6263\u7559\u6216\u5c0d\u4f4f\u5b85\u9032\u884c\u9032\u5165\uff01\u8acb\u6ce8\u610f\uff1a\u5373\u6642\u5f37\u5236\u4fc2\u5c6c\u300c\u516c\u6cd5\u4e0a\u5408\u6cd5\u4e4b\u7279\u5225\u72a7\u7272\u300d\uff0c\u4e26\u975e\u884c\u653f\u8655\u7f70\uff01\u82e5\u4eba\u6c11\u56e0\u5373\u6642\u5f37\u5236\u53d7\u5230\u7279\u5225\u640d\u5bb3\uff0c\u5f97\u4f9d\u6cd5\u8acb\u6c42\u570b\u5bb6\u7d66\u4e88\u300c\u640d\u5931\u88dc\u511f\u300d\uff01\", \"9\": \"\u3010\u4e3b\u6301\u4eba \u5c0e\u5e2b\u3011\uff1a\u6b61\u8fce\u4f86\u5230\u5012\u6578\u7b2c\u4e8c\u500b\u9ec3\u91d1\u55ae\u5143\u3010Module 9\uff1a\u884c\u653f\u6551\u6fdf\u9ad4\u7cfb\uff1a\u8a34\u9858\u8207\u884c\u653f\u8a34\u8a1f\u4e09\u5927\u985e\u578b\u3011\uff01\\n\\n\u7576\u4eba\u6c11\u8a8d\u70ba\u884c\u653f\u6a5f\u95dc\u7684\u884c\u653f\u8655\u5206\u9055\u6cd5\u6216\u4e0d\u7576\uff0c\u4fb5\u5bb3\u5176\u6b0a\u5229\u6642\uff0c\u81fa\u7063\u6cd5\u5f8b\u70ba\u4eba\u6c11\u5efa\u69cb\u4e86\u56b4\u5bc6\u7684\u53f8\u6cd5\u6551\u6fdf\u9ec3\u91d1\u9632\u7dda\uff01\\n\\n\u9996\u5148\u662f\u300c\u8a34\u9858\u7a0b\u5e8f\uff08\u8a34\u9858\u6cd5\uff09\u300d\uff1a\\n\u7576\u4eba\u6c11\u63a5\u7372\u9055\u6cd5\u6216\u4e0d\u7576\u4e4b\u884c\u653f\u8655\u5206\uff0c\u5fc5\u9808\u5728\u8655\u5206\u9001\u9054\u4e4b\u6b21\u65e5\u8d77\u300c30 \u65e5\u4e0d\u8b8a\u671f\u9593\u300d\u5167\uff0c\u7e55\u5177\u8a34\u9858\u66f8\u5411\u300c\u539f\u8655\u5206\u6a5f\u95dc\u4e4b\u4e0a\u7d1a\u6a5f\u95dc\u300d\u63d0\u8d77\u8a34\u9858\uff01\u8a34\u9858\u5be9\u67e5\u7bc4\u570d\u4e0d\u50c5\u5b         let currentChapterId = 1;

        const audio = document.getElementById('mainAudio');

        // Render Chapter List
        chapters.forEach((ch, idx) => {

            card.setAttribute('data-id', ch.id);
            card.innerHTML = `

            card.addEventListener('click', () => {

            chapterPane.appendChild(card);
        });

        function setActiveChapterUI(id) {
            currentChapterId = id;
            document.querySelectorAll('.chapter-card').forEach(c => {
                if (parseInt(c.getAttribute('data-id')) === id) {
                    c.classList.add('active');
                    c.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    c.classList.remove('active');
                }
            });
            updateTranscriptView(id);
        }

        function updateTranscriptView(id) {
            if (fullScriptData[id]) {
                transcriptBox.textContent = fullScriptData[id];
            }
        }

        function playChapter(chId) {
            setActiveChapterUI(chId);
            const ch = chapters.find(c => c.id === chId);
            if (!ch) return;

            isPlayingState = true;
            btnPlay.textContent = "⏸️ 暫停廣播節目";

            // Try Audio Playback
            audio.currentTime = ch.start;
            let playPromise = audio.play();

                    if (speechSynth) speechSynth.cancel();
                }).catch(() => {
                    engineStatus.textContent = "🎙️ 語音引擎發聲中：已啟動瀏覽器高音質真人口播語音！";
                    speakScriptTTS(fullScriptData[chId] || ch.topic);
                });
            } else {
                speakScriptTTS(fullScriptData[chId] || ch.topic);
            }
        }

        function speakScriptTTS(scriptText) {
            if (!speechSynth) return;
            speechSynth.cancel();

            const cleanText = scriptText.replace(/【.*?】/g, '').replace(/（.*?）/g, '');
            const utter = new SpeechSynthesisUtterance(cleanText);
            utter.lang = 'zh-TW';
            utter.rate = parseFloat(speedSelect.value) || 1.0;
            utter.volume = parseFloat(volumeSlider.value) || 1.0;

            const zhVoice = voices.find(v => v.lang.includes('zh-TW') || v.lang.includes('zh-HK') || v.lang.includes('zh'));
            if (zhVoice) utter.voice = zhVoice;

            utter.onend = function() {
                if (isPlayingState && currentChapterId < 10) {
                    playChapter(currentChapterId + 1);
                } else {
                    pauseAll();
                }
            };

            speechSynth.speak(utter);
        }

        function pauseAll() {
            isPlayingState = false;
            audio.pause();
            if (speechSynth) speechSynth.cancel();
            btnPlay.textContent = "▶️ 點擊立即播放廣播節目";
            engineStatus.textContent = "⏸️ 已暫停播放（雙引擎就緒）";
        }

        btnPlay.addEventListener('click', () => {
            if (isPlayingState) {
                pauseAll();
            } else {
                playChapter(currentChapterId);
            }
        });

        btnRewind.addEventListener('click', () => {
            if (audio.currentTime > 0) audio.currentTime = Math.max(0, audio.currentTime - 10);
        });
        btnForward.addEventListener('click', () => {
            if (audio.duration) audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
        });

        seekSlider.addEventListener('input', (e) => {
            audio.currentTime = parseFloat(e.target.value);
        });

        speedSelect.addEventListener('change', (e) => {
            audio.playbackRate = parseFloat(e.target.value);
            if (speechSynth && speechSynth.speaking) {
                speakScriptTTS(fullScriptData[currentChapterId] || "");
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = parseFloat(e.target.value);
        });

        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        audio.addEventListener('loadedmetadata', () => {
            seekSlider.max = Math.floor(audio.duration || 1757);
            durationTimeEl.textContent = formatTime(audio.duration || 1757);
        });

        audio.addEventListener('timeupdate', () => {
            seekSlider.value = Math.floor(audio.currentTime);
            currentTimeEl.textContent = formatTime(audio.currentTime);

            const curSec = audio.currentTime;
            const curCh = chapters.find(c => curSec >= c.start && curSec < c.end);
            if (curCh && curCh.id !== currentChapterId) {
                setActiveChapterUI(curCh.id);
            }
        });

        // Dynamic Waveform Canvas Animation
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let animStep = 0;
        function drawWaveform() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const active = isPlayingState || !audio.paused || (speechSynth && speechSynth.speaking);
            const width = canvas.width;
            const height = canvas.height;
            const centerY = height / 2;

            ctx.lineWidth = 2.5;
            ctx.strokeStyle = active ? "#f59e0b" : "#475569";

            ctx.beginPath();
            const bars = 60;
            const barWidth = width / bars;

            for (let i = 0; i < bars; i++) {
                const amp = active ? Math.sin(animStep * 0.12 + i * 0.3) * 35 + Math.random() * 20 : 4;
                const x = i * barWidth + barWidth / 2;
                ctx.moveTo(x, centerY - amp);
                ctx.lineTo(x, centerY + amp);
            }
            ctx.stroke();

            if (active) animStep++;
            requestAnimationFrame(drawWaveform);
        }
        drawWaveform();
    </script>
</body>
</html>
