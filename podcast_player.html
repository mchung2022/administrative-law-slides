    <script>
        const chapters = [{"id": 1, "start": 0.0, "end": 167.38, "time": "00:00", "title": "Module 1：節目開場與行政法基本概念與現代法治國", "topic": "公權力行政 vs 私經濟國庫行政與給付行政理念", "script": "【阿哲】：哈囉！各位同學、法學愛好者與各大考試的考生們，大家辛苦了！歡迎收聽《行政法 500 頁旗艦總複習——30 分鐘特企 Podcast 廣播對談講堂》！我是廣播主持人阿哲。\n\n【小晨】：嗨，大家午安！我是你們的法治導師小晨。今天這集整整 30 分鐘的精華廣播特輯，是我們教學團隊特別從《行政法 500 頁旗艦講義》與 50 萬字大書講稿中，濃縮出來最輕鬆、最白話、最貼近大考命題脈絡的雙主持人廣播對談！\n\n【阿哲】：小晨老師，很多學生一聽到行政法就覺得條文高深莫測。像我常常在新聞看到高鐵採購、政府標案，或是公立醫院掛號、路面坑洞傷人，這些到底算公法還是私法啊？阿哲我自己平常看新聞也常搞混呢！\n\n【小晨】：阿哲問得太棒了！在 Module 1 中，最重要的第一步就是建立「公權力行政」與「私經濟國庫行政」的劃分直覺。當政府機關立於平等私經濟主體地位進行採購時，屬於民法私法契約；但若涉及公權力對人民權益之單方干涉或裁罰，則一律受行政程序法與公法原則嚴格拘束！\n\n【阿哲】：原來如此！那像政府發放育兒津貼、大眾運輸補助或是全民健保，這些給人民好處的「給付行政」，機關也能隨心所欲嗎？\n\n【小晨】：絕對不行！現代國家從過去干涉的警察國家，轉型為照顧生活的給付行政與服務性國家。即使是授益行政，也必須嚴格遵守依法行政原則與公平分配！\n\n【阿哲】：那在法源體系上，成文法金字塔與不成文法源又是如何運作的呢？\n\n【小晨】：成文法以憲法為至高頂點，下方依次為立法院三讀之法律、行政機關發布之法規命令與地方自治條例！不成文法源則包含習慣法與一般法律原則。\n\n【阿哲】：聽小晨老師這麼一拆解，感覺公私法的界線與法源層級一下子就清晰起來了！\n\n【小晨】：沒錯！把握住第一單元的直覺，我們接著進入第二單元！"}, {"id": 2, "start": 167.38, "end": 276.68, "time": "02:47", "title": "Module 2：依法行政原則與司法院釋字第 443 號層次化法律保留", "topic": "消極依法行政（法律優位）與積極依法行政（法律保留）", "script": "【阿哲】：歡迎來到第二單元【Module 2：依法行政原則與層次化法律保留】。小晨老師，行政機關如果隨便發個公文行政命令，就能直接限制人民營業或是扣押財產嗎？\n\n【小晨】：絕對不行！這正是現代法治國的最高防線——依法行政原則！它有兩大支柱：第一是「消極的依法行政」，也就是「法律優位原則」（行政程序法第 4 條），行政命令與處分絕不能抵觸立法院通過的法律！\n\n【阿哲】：那第二個支柱，是不是大考素養題最愛考的「法律保留原則」？\n\n【小晨】：完全正確！沒有法律的授權，機關不能擅自干涉人民自由與財產。大家務必熟記【司法院釋字第 443 號解釋】創設的四大授權層級：第一層憲法保留（人身自由提審）；第二層絕對法律保留（限制生命身體自由之刑罰與管束，必須國會親自立法）；第三層相對法律保留（課稅、裁罰與營業限制，需法律明確授權）；第四層則是執行性細節性行政規則！\n\n【阿哲】：聽懂了！只要考題看到行政機關未獲法律明確授權，就擅自發發令函處罰人民，直接判定該行政行為違法就對了！\n\n【小晨】：沒錯！另外要注意「特別權力關係」的演變，過去學生退學或公務員懲戒不能提訴訟，如今大法官憲判字均已全面打破，保障訴訟權！\n\n【阿哲】：這對保障國民權益真是太重要了！國會親自立法保障人權，才是法治國真正的精髓！\n\n【小晨】：是的！這也是大考複選題與簡答題最喜歡考的憲法法庭判決意旨！"}, {"id": 3, "start": 276.68, "end": 373.93, "time": "04:36", "title": "Module 3：一般法律原則（一）：平等原則與比例原則過磅審查", "topic": "行政程序法第 6 條與第 7 條（適當性、必要性、狹義比例性）", "script": "【阿哲】：第三單元我們聊【Module 3：一般法律原則（一）：平等原則與比例原則】。小晨老師，如果隔壁違規沒被警察抓，我被開罰，我可以在法庭上主張平等原則要求撤銷罰單嗎？\n\n【小晨】：阿哲這個問題代表了無數考生的盲點！實務法理鐵律是：「違法者不得主張違法之平等！」平等原則（行政程序法第 6 條）保障的是正當理由之實質平等，違法行為不存在平等保護。\n\n【阿哲】：那行政法中最具權威的大帝王條款——「比例原則」又該如何進行審查過磅呢？\n\n【小晨】：比例原則（行政程序法第 7 條）包含三大過磅子原則，順序絕不能錯：一、適當性（手段有助目的達成）；二、必要性（選擇對人民侵害最小的手段）；三、狹義比例性（手段損害不得與欲達成之目的顯失均衡）。換句話說，絕不能為了趕走一隻蚊子而用大砲炸毀整棟房子！\n\n【阿哲】：那「禁止不當聯結原則」又是指什麼呢？\n\n【小晨】：是指行政機關給予許可或行政處分時，不得要求人民負擔與該行政目的無正當合理關聯之義務！例如核發建築執照不能強迫捐贈警用機車，這就是禁止不當聯結！\n\n【阿哲】：原來行政機關不能抓著人民要執照，就附帶牽強的要求，這原則真是太體貼人民了！\n\n【小晨】：是的！比例原則與禁止不當聯結，就是防止公權力過度膨脹的雙重鎖鏈！"}, {"id": 4, "start": 373.93, "end": 465.71, "time": "06:13", "title": "Module 4：一般法律原則（二）：信賴保護、誠信原則與裁量控制", "topic": "行政程序法第 8 條與第 10 條（裁量濫用、裁量逾越、裁量怠惰）", "script": "【阿哲】：第四單元【Module 4：信賴保護與裁量控制】。小晨老師，如果政府頒發合法建廠許可給我，我也投入資金了，政府兩年後突然因為公益考量要廢止許可，我該怎麼辦？\n\n【小晨】：這就涉及《行政程序法》第 8 條的「信賴保護原則」！主張信賴保護必須具備三大要件：信賴基礎（處分存在）、信賴表現（付諸具體經濟行為）與信賴值得保護（無詐欺違法）。只要具備這三要件，機關廢止處分就必須給予人民合理的金錢補償！\n\n【阿哲】：那關於官員的「行政裁量權」，如果官員因為個人好惡或立場不同而任意加重罰款呢？\n\n【小晨】：這屬於違法裁量！依據第 10 條，裁量瑕疵分為三種：裁量逾越（超過授權金額上下限）、裁量濫用（考量無關因素）與裁量怠惰（拒絕在個案中彈性考量）。行政法院一律會判決撤銷！\n\n【阿哲】：那什麼情況下裁量會「收縮至零」呢？\n\n【小晨】：當發生急迫生命危險時，行政機關採取某種特定裁量手段成為唯一合法選擇，機關就負有特定採行義務！\n\n【阿哲】：信賴保護保護人民的法安定性，裁量控制防止官員濫權，真是相輔相成！\n\n【小晨】：完全正確！接著我們來看最核心的行政行為態樣——行政處分！"}, {"id": 5, "start": 465.71, "end": 562.43, "time": "07:45", "title": "Module 5：行政行為態樣（一）：行政處分黃金六要素與無效撤銷", "topic": "行政程序法第 92 條、第 111 條與第 117 條全解密", "script": "【阿哲】：收聽過半了！第五單元【Module 5：行政處分黃金六要素】。小晨老師，警察開的交通超速罰單、環保局的勒令停業通知，到底算不算行政處分？\n\n【小晨】：這都是標準的行政處分！請大家牢記《行政程序法》第 92 條黃金六大要素：行政機關、公法事件、單方行為、具體處置、對外直接與產生法律效果！只要符合這六要素，人民才能在 30 日內提起訴願。\n\n【阿哲】：如果行政處分有瑕疵，無效跟撤銷有什麼差別？\n\n【小晨】：依據第 111 條，處分若有重大明顯瑕疵（如缺乏權限）屬於自始無效；而第 117 條一般違法處分原則上仍有效，但得依職權或於 30 日不變期間內提起訴願及撤銷訴訟予以撤銷！\n\n【阿哲】：那「廢止」合法處分又是怎麼一回事呢？\n\n【小晨】：依據第 123 條，合法處分因法定廢止權保留、未履行附款、或事後法規事實變更始得向將來廢止！\n\n【阿哲】：阿哲總算分清楚了：無效是自始無效，撤銷是針對違法處分溯及失效，廢止則是針對合法處分向將來失效！\n\n【小晨】：歸納得太精準了！這正是大考選擇題最高頻出現的定性觀念！"}, {"id": 6, "start": 562.43, "end": 637.17, "time": "09:22", "title": "Module 6：行政行為態樣（二）：行政契約、事實行為與行政指導", "topic": "行政程序法第 135 條、第 159 條與第 165 條實務劃分", "script": "【阿哲】：第六單元【Module 6：行政契約與行政指導】。小晨老師，衛生局建議民眾施打疫苗，如果不去打會被處罰嗎？\n\n【小晨】：絕對不會！這屬於《行政程序法》第 165 條的「行政指導」，不具法律強制力，相對人得明確拒絕，機關絕不得因拒絕而給予不利處分！\n\n【阿哲】：那像公費醫學生簽署的服務契約呢？\n\n【小晨】：那屬於第 135 條雙方合意的「公法上行政契約」，若發生履約爭議應提起一般給付訴訟！而警察指揮交通、鋪設路面則屬於純粹事實行為。\n\n【阿哲】：那行政機關內部頒布的「行政規則」跟「法規命令」有何差別？\n\n【小晨】：法規命令（第 150 條）對外拘束一般民眾，需法律明確授權；行政規則（第 159 條）僅機關內部拘束，如裁量基準！\n\n【阿哲】：弄懂了行為態樣，在救濟時就能選對正確的訴訟類型！\n\n【小晨】：沒錯！接著我們來看國家如何實施行政懲罰！"}, {"id": 7, "start": 637.17, "end": 723.19, "time": "10:37", "title": "Module 7：行政制裁：行政罰法原理與新聞真實裁罰", "topic": "行政罰法定原則、主觀歸責（第 7 條）與一行為不二罰（第 24 條）", "script": "【阿哲】：第七單元【Module 7：行政罰法原理】。小晨老師，新聞常看到酒駕被抓，既要移送刑法法辦又要被交通局開罰鍰，這樣算不算一行為二罰？\n\n【小晨】：阿哲問到大考超級熱門考點了！《行政罰法》第 24 條規定「一行為不二罰原則」，並採取「刑事優先原則」！酒駕觸犯刑法公共危險罪，應先由法院判處刑事罰；只有在檢察官不起訴或緩起訴確定後，行政機關始得裁處罰鍰！\n\n【阿哲】：那機關開罰前，需要證明民眾有故意或過失嗎？\n\n【小晨】：絕對要！依據第 7 條第 1 項，非出於故意或過失者不予處罰，臺灣法律已全面廢除舊有的推定過失制度，機關負有舉證責任！\n\n【阿哲】：那未滿十四歲之人違法會被罰嗎？\n\n【小晨】：依據第 9 條，未滿十四歲人無責任能力不予處罰；十四歲以上未滿十八歲人得減輕處罰！\n\n【阿哲】：責任能力與刑事優先原則，真是保障人權的雙重防線！\n\n【小晨】：是的！這也是考生在素養選擇題中最容易失分的地方！"}, {"id": 8, "start": 723.19, "end": 796.29, "time": "12:03", "title": "Module 8：行政執行法與即時強制", "topic": "金錢給付執行、行為不行為執行（代履行/怠金）與即時強制", "script": "【阿哲】：第八單元【Module 8：行政執行法與即時強制】。小晨老師，如果民眾賴皮不繳罰單或死不拆除違建，國家怎麼發揮公權力強制執行？\n\n【小晨】：依據《行政執行法》，公法金錢欠款移送行政執行署扣押管收；拆除違建採用「代履行」（代為拆除向民眾收費），或裁處「怠金」（連續開罰直到履行為止）！\n\n【阿哲】：那颱風天警察預防性強制封橋，或是隔離醉酒狂暴之人，這算行政處罰嗎？\n\n【小晨】：這屬於第 36 條「即時強制」，係為阻止急迫危難之公法合法特別犧牲，非處罰！若造成特別損害得請求國家給予損失補償！\n\n【阿哲】：那民眾對強制執行不服，程序上該怎麼救濟？\n\n【小晨】：依據第 9 條，應於執行程序終結前向執行機關聲明異議！\n\n【阿哲】：聲明異議是行政執行專屬的救濟途徑，大家千萬不要跟訴願混淆了！\n\n【小晨】：阿哲提醒得太及時了！接著我們來看最關鍵的行政救濟體系！"}, {"id": 9, "start": 796.29, "end": 871.31, "time": "13:16", "title": "Module 9：行政救濟體系：訴願與行政訴訟三大類型", "topic": "訴願 30 日不變期間、訴願前置原則與行政訴訟三級二審制", "script": "【阿哲】：第九單元【Module 9：行政救濟體系】。小晨老師，收到違法罰單不服，最慢要在幾天內提起訴願？\n\n【小晨】：請大家牢記《訴願法》送達次日起「30 日不變期間」，向原處分機關之上級提起訴願！採訴願前置原則。\n\n【阿哲】：那訴願未獲救濟後，行政訴訟有哪幾種呢？\n\n【小晨】：三大訴訟類型：撤銷訴訟（撤銷負擔處分）、課予義務訴訟（命機關核發許可）與一般給付/確認訴訟！目前採用高等行政訴訟庭與最高行政法院三級二審制！\n\n【阿哲】：那提起訴願或訴訟期間，原本的處分會停止執行嗎？\n\n【小晨】：原則上「不停止執行」！除非有難以回復之重大損害且情況急迫，始得向法院聲請停止執行！\n\n【阿哲】：30日不變期間加上不停止執行原則，真是搶時間救濟的關鍵概念！\n\n【小晨】：完全正確！最後我們來看國家如何對人民負擔損害賠償責任！"}, {"id": 10, "start": 871.31, "end": 936.93, "time": "14:31", "title": "Module 10：國家責任全剖析與大考結業錦囊", "topic": "國家賠償法第 2 條與第 3 條、協議先行程序與總複習結業叮嚀", "script": "【阿哲】：最終章【Module 10：國家責任與大考結業錦囊】。小晨老師，如果馬路施工有坑洞害騎士摔傷，國家能推託不知道嗎？\n\n【小晨】：絕不能！依據《國家賠償法》第 3 條公有公共設施管理欠缺，國家負「無過失賠償責任」！而第 2 條公務員違法侵害權利則需有故意過失。請求國賠前必須先進行「協議先行程序」！\n\n【阿哲】：太充實了！感謝小晨老師這 30 分鐘帶我們通盤貫通行政法十大模組！用雙人廣播對談的方式複習，聽得又清楚又輕鬆！\n\n【小晨】：不客氣！法律是維護權利與自由的武器。祝大家大考高分奪標，《行政法 500 頁旗艦總複習》Podcast，我們下次見！\n\n【阿哲】：祝大家金榜題名，加油！掰掰！"}];

55\u5c0d\u6cd5\u5f8b\u4fdd\u7559\uff08\u9650\u5236\u751f\u547d\u8eab\u9ad4\u81ea\u7531\u4e4b\u5211\u7f70\u8207\u7ba1\u675f\uff0c\u5fc5\u9808\u570b\u6703\u89aa\u81ea\u7acb\u6cd5\uff09\uff1b\u7b2c\u4e09\u5c64\u76f8\u5c0d\u6cd5\u5f8b\u4fdd\u7559\uff08\u8ab2\u7a05\u3001\u88c1\u7f70\u8207\u71df\u696d\u9650\u5236\uff0c\u9700\u6cd5\u5f8b\u660e\u78ba\u6388\u6b0a\uff09\uff1b\u7b2c\u56db\u5c64\u5247\u662f\u57f7\u884c\u6027\u7d30\u7bc0\u6027\u884c\u653f\u898f\u5247\uff01\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u807d\u61c2\u4e86\uff01\u53ea\u8981\u8003\u984c\u770b\u5230\u884c\u653f\u6a5f\u95dc\u672a\u7372\u6cd5\u5f8b\u660e\u78ba\u6388\u6b0a\uff0c\u5c31\u64c5\u81ea\u767c\u767c\u4ee4\u51fd\u8655\u7f70\u4eba\u6c11\uff0c\u76f4\u63a5\u5224\u5b9a\u8a72\u884c\u653f\u884c\u70ba\u9055\u6cd5\u5c31\u5c0d\u4e86\uff01\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u6c92\u932f\uff01\u53e6\u5916\u8981\u6ce8\u610f\u300c\u7279\u5225\u6b0a\u529b\u95dc\u4fc2\u300d\u7684\u6f14\u8b8a\uff0c\u904e\u53bb\u5b78\u751f\u9000\u5b78\u6216\u516c\u52d9\u54e1\u61f2\u6212\u4e0d\u80fd\u63d0\u8a34\u8a1f\uff0c\u5982\u4eca\u5927\u6cd5\u5b98\u61b2\u5224\u5b57\u5747\u5df2\u5168\u9762\u6253\u7834\uff0c\u4fdd\u969c\u8a34\u8a1f\u6b0a\uff01\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u9019\u5c0d\u4fdd\u969c\u570b\u6c11\u6b0a\u76ca\u771f\u662f\u592a\u91cd\u8981\u4e86\uff01\u570b\u6703\u89aa\u81ea\u7acb\u6cd5\u4fdd\u969c\u4eba\u6b0a\uff0c\u624d\u662f\u6cd5\u6cbb\u570b\u771f\u6b63\u7684\u7cbe\u9ad3\uff01\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u662f\u7684\uff01\u9019\u4e5f\u662f\u5927\u8003\u8907\u9078\u984c\u8207\u7c21\u7b54\u984c\u6700\u559c\u6b61\u8003\u7684\u61b2\u6cd5\u6cd5\u5ead\u5224\u6c7a\u610f\u65e8\uff01\", \"3\": \"\u3010\u963f\u54f2\u3011\uff1a\u7b2c\u4e09\u55ae\u5143\u6211\u5011\u804a\u3010Module 3\uff1a\u4e00\u822c\u6cd5\u5f8b\u539f\u5247\uff08\u4e00\uff09\uff1a\u5e73\u7b49\u539f\u5247\u8207\u6bd4\u4f8b\u539f\u5247\u3011\u3002\u5c0f\u6668\u8001\u5e2b\uff0c\u5982\u679c\u9694\u58c1\u9055\u898f\u6c92\u88ab\u8b66\u5bdf\u6293\uff0c\u6211\u88ab\u958b\u7f70\uff0c\u6211\u53ef\u4ee5\u5728\u6cd5\u5ead\u4e0a\u4e3b\u5f35\u5e73\u7b49\u539f\u5247\u8981\u6c42\u64a4\u92b7\u7f70\u55ae\u55ce\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u963f\u54f2\u9019\u500b\u554f\u984c\u4ee3\u8868\u4e86\u7121\u6578\u8003\u751f\u7684\u76f2\u9ede\uff01\u5be6\u52d9\u6cd5\u7406\u9435\u5f8b\u662f\uff1a\u300c\u9055\u6cd5\u8005\u4e0d\u5f97\u4e3b\u5f35\u9055\u6cd5\u4e4b\u5e73\u7b49\uff01\u300d\u5e73\u7b49\u539f\u5247\uff08\u884c\u653f\u7a0b\u5e8f\u6cd5\u7b2c 6 \u689d\uff09\u4fdd\u969c\u7684\u662f\u6b63\u7576\u7406\u7531\u4e4b\u5be6\u8cea\u5e73\u7b49\uff0c\u9055\u6cd5\u884c\u70ba\u4e0d\u5b58\u5728\u5e73\u7b49\u4fdd\u8b77\u3002\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u90a3\u884c\u653f\u6cd5\u4e2d\u6700\u5177\u6b0a\u5a01\u7684\u5927\u5e1d\u738b\u689d\u6b3e\u2014\u2014\u300c\u6bd4\u4f8b\u539f\u5247\u300d\u53c8\u8a72\u5982\u4f55\u9032\u884c\u5be9\u67e5\u904e\u78c5\u5462\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u6bd4\u4f8b\u539f\u5247\uff08\u884c\u653f\u7a0b\u5e8f\u6cd5\u7b2c 7 \u689d\uff09\u5305\u542b\u4e09\u5927\u904e\u78c5\u5b50\u539f\u5247\uff0c\u9806\u5e8f\u7d55\u4e0d\u80fd\u932f\uff1a\u4e00\u3001\u9069\u7576\u6027\uff08\u624b\u6bb5\u6709\u52a9\u76ee\u7684\u9054\u6210\uff09\uff1b\u4e8c\u3001\u5fc5\u8981\u6027\uff08\u9078\u64c7\u5c0d\u4eba\u6c11\u4fb5\u5bb3\u6700\u5c0f\u7684\u624b\u6bb5\uff09\uff1b\u4e09\u3001\u72f9\u7fa9\u6bd4\u4f8b\u6027\uff08\u624b\u6bb5\u640d\u5bb3\u4e0d\u5f97\u8207\u6b32\u9054\u6210\u4e4b\u76ee\u7684\u986f\u5931\u5747\u8861\uff09\u3002\u63db\u53e5\u8a71\u8aaa\uff0c\u7d55\u4e0d\u80fd\u70ba\u4e86\u8d95\u8d70\u4e00\u96bb\u868a\u5b50\u800c\u7528\u5927\u7832\u70b8\u6bc0\u6574\u68df\u623f\u5b50\uff01\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u90a3\u300c\u7981\u6b62\u4e0d\u7576\u806f\u7d50\u539f\u5247\u300d\u53c8\u662f\u6307\u4ec0\u9ebc\u5462\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u662f\u6307\u884c\u653f\u6a5f\u95dc\u7d66\u4e88\u8a31\u53ef\u6216\u884c\u653f\u8655\u5206\u6642\uff0c\u4e0d\u5f97\u8981\u6c42\u4eba\u6c11\u8ca0\u64d4\u8207\u8a72\u884c\u653f\u76ee\u7684\u7121\u6b63\u7576\u5408\u7406\u95dc\u806f\u4e4b\u7fa9\u52d9\uff01\u4f8b\u5982\u6838\u767c\u5efa\u7bc9\u57f7\u7167\u4e0d\u80fd\u5f37\u8feb\u6350\u8d08\u8b66\u7528\u6a5f\u8eca\uff0c\u9019\u5c31\u662f\u7981\u6b62\u4e0d\u7576\u806f\u7d50\uff01\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u539f\u4f86\u884c\u653f\u6a5f\u95dc\u4e0d\u80fd\u6293\u8457\u4eba\u6c11\u8981\u57f7\u7167\uff0c\u5c31\u9644\u5e36\u727d\u5f37\u7684\u8981\u6c42\uff0c\u9019\u539f\u5247\u771f\u662f\u592a\u9ad4\u8cbc\u4eba\u6c11\u4e86\uff01\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u662f\u7684\uff01\u6bd4\u4f8b\u539f\u5247\u8207\u7981\u6b62\u4e0d\u7576\u806f\u7d50\uff0c\u5c31\u662f\u9632\u6b62\u516c\u6b0a\u529b\u904e\u5ea6\u81a8\u8139\u7684\u96d9\u91cd\u9396\u93c8\uff01\", \"4\": \"\u3010\u963f\u54f2\u3011\uff1a\u7b2c\u56db\u55ae\u5143\u3010Module 4\uff1a\u4fe1\u8cf4\u4fdd\u8b77\u8207\u88c1\u91cf\u63a7\u5236\u3011\u3002\u5c0f\u6668\u8001\u5e2b\uff0c\u5982\u679c\u653f\u5e9c\u9812\u767c\u5408\u6cd5\u5efa\u5ee0\u8a31\u53ef\u7d66\u6211\uff0c\u6211\u4e5f\u6295\u5165\u8cc7\u91d1\u4e86\uff0c\u653f\u5e9c\u5169\u5e74\u5f8c\u7a81\u7136\u56e0\u70ba\u516c\u76ca\u8003\u91cf\u8981\u5ee2\u6b62\u8a31\u53ef\uff0c\u6211\u8a72\u600e\u9ebc\u8fa6\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u9019\u5c31\u6d89\u53ca\u300a\u884c\u653f\u7a0b\u5e8f\u6cd5\u300b\u7b2c 8 \u689d\u7684\u300c\u4fe1\u8cf4\u4fdd\u8b77\u539f\u5247\u300d\uff01\u4e3b\u5f35\u4fe1\u8cf4\u4fdd\u8b77\u5fc5\u9808\u5177\u5099\u4e09\u5927\u8981\u4ef6\uff1a\u4fe1\u8cf4\u57fa\u790e\uff08\u8655\u5206\u5b58\u5728\uff09\u3001\u4fe1\u8cf4\u8868\u73fe\uff08\u4ed8\u8af8\u5177\u9ad4\u7d93\u6fdf\u884c\u70ba\uff09\u8207\u4fe1\u8cf4\u503c\u5f97\u4fdd\u8b77\uff08\u7121\u8a50\u6b3a\u9055\u6cd5\uff09\u3002\u53ea\u8981\u5177\u5099\u9019\u4e09\u8981\u4ef6\uff0c\u6a5f\u95dc\u5ee2\u6b62\u8655\u5206\u5c31\u5fc5\u9808\u7d66\u4e88\u4eba\u6c11\u5408\u7406\u7684\u91d1\u9322\u88dc\u511f\uff01\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u90a3\u95dc\u65bc\u5b98\u54e1\u7684\u300c\u884c\u653f\u88c1\u91cf\u6b0a\u300d\uff0c\u5982\u679c\u5b98\u54e1\u56e0\u70ba\u500b\u4eba\u597d\u60e1\u6216\u7acb\u5834\u4e0d\u540c\u800c\u4efb\u610f\u52a0\u91cd\u7f70\u6b3e\u5462\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u9019\u5c6c\u65bc\u9055\u6cd5\u88c1\u91cf\uff01\u4f9d\u64da\u7b2c 10 \u689d\uff0c\u88c1\u91cf\u7455\u75b5\u5206\u70ba\u4e09\u7a2e\uff1a\u88c1\u91cf\u903e\u8d8a\uff08\u8d85\u904e\u6388\u6b0a\u91d1\u984d\u4e0a\u4e0b\u9650\uff09\u3001\u88c1\u91cf\u6feb\u7528\uff08\u8003\u91cf\u7121\u95dc\u56e0\u7d20\uff09\u8207\u88c1\u91cf\u6020\u60f0\uff08\u62d2\u7d55\u5728\u500b\u6848\u4e2d\u5f48\u6027\u8003\u91cf\uff09\u3002\u884c\u653f\u6cd5\u9662\u4e00\u5f8b\u6703\u5224\u6c7a\u64a4\u92b7\uff01\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u90a3\u4ec0\u9ebc\u60c5\u6cc1\u4e0b\u88c1\u91cf\u6703\u300c\u6536\u7e2e\u81f3\u96f6\u300d\u5462\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u7576\u767c\u751f\u6025\u8feb\u751f\u547d\u5371\u96aa\u6642\uff0c\u884c\u653f\u6a5f\u95dc\u63a1\u53d6\u67d0\u7a2e\u7279\u5b9a\u88c1\u91cf\u624b\u6bb5\u6210\u70ba\u552f\u4e00\u5408\u6cd5\u9078\u64c7\uff0c\u6a5f\u95dc\u5c31\u8ca0\u6709\u7279\u5b9a\u63a1\u884c\u7fa9\u52d9\uff01\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u4fe1\u8cf4\u4fdd\u8b77\u4fdd\u8b77\u4eba\u6c11\u7684\u6cd5\u5b89\u5b9a\u6027\uff0c\u88c1\u91cf\u63a7\u5236\u9632\u6b62\u5b98\u54e1\u6feb\u6b0a\uff0c\u771f\u662f\u76f8\u8f14\u76f8\u6210\uff01\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u5b8c\u5168\u6b63\u78ba\uff01\u63a5\u8457\u6211\u5011\u4f86\u770b\u6700\u6838\u5fc3\u7684\u884c\u653f\u884c\u70ba\u614b\u6a23\u2014\u2014\u884c\u653f\u8655\u5206\uff01\", \"5\": \"\u3010\u963f\u54f2\u3011\uff1a\u6536\u807d\u904e\u534a\u4e86\uff01\u7b2c\u4e94\u55ae\u5143\u3010Module 5\uff1a\u884c\u653f\u8655\u5206\u9ec3\u91d1\u516d\u8981\u7d20\u3011\u3002\u5c0f\u6668\u8001\u5e2b\uff0c\u8b66\u5bdf\u958b\u7684\u4ea4\u901a\u8d85\u901f\u7f70\u55ae\u3001\u74b0\u4fdd\u5c40\u7684\u52d2\u4ee4\u505c\u696d\u901a\u77e5\uff0c\u5230\u5e95\u7b97\u4e0d\u7b97\u884c\u653f\u8655\u5206\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u9019\u90fd\u662f\u6a19\u6e96\u7684\u884c\u653f\u8655\u5206\uff01\u8acb\u5927\u5bb6\u7262\u8a18\u300a\u884c\u653f\u7a0b\u5e8f\u6cd5\u300b\u7b2c 92 \u689d\u9ec3\u91d1\u516d\u5927\u8981\u7d20\uff1a\u884c\u653f\u6a5f\u95dc\u3001\u516c\u6cd5\u4e8b\u4ef6\u3001\u55ae\u65b9\u884c\u70ba\u3001\u5177\u9ad4\u8655\u7f6e\u3001\u5c0d\u5916\u76f4\u63a5\u8207\u7522\u751f\u6cd5\u5f8b\u6548\u679c\uff01\u53ea\u8981\u7b26\u5408\u9019\u516d\u8981\u7d20\uff0c\u4eba\u6c11\u624d\u80fd\u5728 30 \u65e5\u5167\u63d0\u8d77\u8a34\u9858\u3002\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u5982\u679c\u884c\u653f\u8655\u5206\u6709\u7455\u75b5\uff0c\u7121\u6548\u8ddf\u64a4\u92b7\u6709\u4ec0\u9ebc\u5dee\u5225\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u4f9d\u64da\u7b2c 111 \u689d\uff0c\u8655\u5206\u82e5\u6709\u91cd\u5927\u660e\u986f\u7455\u75b5\uff08\u5982\u7f3a\u4e4f\u6b0a\u9650\uff09\u5c6c\u65bc\u81ea\u59cb\u7121\u6548\uff1b\u800c\u7b2c 117 \u689d\u4e00\u822c\u9055\u6cd5\u8655\u5206\u539f\u5247\u4e0a\u4ecd\u6709\u6548\uff0c\u4f46\u5f97\u4f9d\u8077\u6b0a\u6216\u65bc 30 \u65e5\u4e0d\u8b8a\u671f\u9593\u5167\u63d0\u8d77\u8a34\u9858\u53ca\u64a4\u92b7\u8a34\u8a1f\u4e88\u4ee5\u64a4\u92b7\uff01\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u90a3\u300c\u5ee2\u6b62\u300d\u5408\u6cd5\u8655\u5206\u53c8\u662f\u600e\u9ebc\u4e00\u56de\u4e8b\u5462\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u4f9d\u64da\u7b2c 123 \u689d\uff0c\u5408\u6cd5\u8655\u5206\u56e0\u6cd5\u5b9a\u5ee2\u6b62\u6b0a\u4fdd\u7559\u3001\u672a\u5c65\u884c\u9644\u6b3e\u3001\u6216\u4e8b\u5f8c\u6cd5\u898f\u4e8b\u5be6\u8b8a\u66f4\u59cb\u5f97\u5411\u5c07\u4f86\u5ee2\u6b62\uff01\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u963f\u54f2\u7e3d\u7b97\u5206\u6e05\u695a\u4e86\uff1a\u7121\u6548\u662f\u81ea\u59cb\u7121\u6548\uff0c\u64a4\u92b7\u662f\u91dd\u5c0d\u9055\u6cd5\u8655\u5206\u6eaf\u53ca\u5931\u6548\uff0c\u5ee2\u6b62\u5247\u662f\u91dd\u5c0d\u5408\u6cd5\u8655\u5206\u5411\u5c07\u4f86\u5931\u6548\uff01\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u6b78\u7d0d\u5f97\u592a\u7cbe\u6e96\u4e86\uff01\u9019\u6b63\u662f\u5927\u8003\u9078\u64c7\u984c\u6700\u9ad8\u983b\u51fa\u73fe\u7684\u5b9a\u6027\u89c0\u5ff5\uff01\", \"6\": \"\u3010\u963f\u54f2\u3011\uff1a\u7b2c\u516d\u55ae\u5143\u3010Module 6\uff1a\u884c\u653f\u5951\u7d04\u8207\u884c\u653f\u6307\u5c0e\u3011\u3002\u5c0f\u6668\u8001\u5e2b\uff0c\u885b\u751f\u5c40\u5efa\u8b70\u6c11\u773e\u65bd\u6253\u75ab\u82d7\uff0c\u5982\u679c\u4e0d\u53bb\u6253\u6703\u88ab\u8655\u7f70\u55ce\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u7d55\u5c0d\u4e0d\u6703\uff01\u9019\u5c6c\u65bc\u300a\u884c\u653f\u7a0b\u5e8f\u6cd5\u300b\u7b2c 165 \u689d\u7684\u300c\u884c\u653f\u6307\u5c0e\u300d\uff0c\u4e0d\u5177\u6cd5\u5f8b\u5f37\u5236\u529b\uff0c\u76f8\u5c0d\u4eba\u5f97\u660e\u78ba\u62d2\u7d55\uff0c\u6a5f\u95dc\u7d55\u4e0d\u5f97\u56e0\u62d2\u7d55\u800c\u7d66\u4e88\u4e0d\u5229\u8655\u5206\uff01\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u90a3\u50cf\u516c\u8cbb\u91ab\u5b78\u751f\u7c3d\u7f72\u7684\u670d\u52d9\u5951\u7d04\u5462\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u90a3\u5c6c\u65bc\u7b2c 135 \u689d\u96d9\u65b9\u5408\u610f\u7684\u300c\u516c\u6cd5\u4e0a\u884c\u653f\u5951\u7d04\u300d\uff0c\u82e5\u767c\u751f\u5c65\u7d04\u722d\u8b70\u61c9\u63d0\u8d77\u4e00\u822c\u7d66\u4ed8\u8a34\u8a1f\uff01\u800c\u8b66\u5bdf\u6307\u63ee\u4ea4\u901a\u3001\u92ea\u8a2d\u8def\u9762\u5247\u5c6c\u65bc\u7d14\u7cb9\u4e8b\u5be6\u884c\u70ba\u3002\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u90a3\u884c\u653f\u6a5f\u95dc\u5167\u90e8\u9812\u5e03\u7684\u300c\u884c\u653f\u898f\u5247\u300d\u8ddf\u300c\u6cd5\u898f\u547d\u4ee4\u300d\u6709\u4f55\u5dee\u5225\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u6cd5\u898f\u547d\u4ee4\uff08\u7b2c 150 \u689d\uff09\u5c0d\u5916\u62d8\u675f\u4e00\u822c\u6c11\u773e\uff0c\u9700\u6cd5\u5f8b\u660e\u78ba\u6388\u6b0a\uff1b\u884c\u653f\u898f\u5247\uff08\u7b2c 159 \u689d\uff09\u50c5\u6a5f\u95dc\u5167\u90e8\u62d8\u675f\uff0c\u5982\u88c1\u91cf\u57fa\u6e96\uff01\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u5f04\u61c2\u4e86\u884c\u70ba\u614b\u6a23\uff0c\u5728\u6551\u6fdf\u6642\u5c31\u80fd\u9078\u5c0d\u6b63\u78ba\u7684\u8a34\u8a1f\u985e\u578b\uff01\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u6c92\u932f\uff01\u63a5\u8457\u6211\u5011\u4f86\u770b\u570b\u5bb6\u5982\u4f55\u5be6\u65bd\u884c\u653f\u61f2\u7f70\uff01\", \"7\": \"\u3010\u963f\u54f2\u3011\uff1a\u7b2c\u4e03\u55ae\u5143\u3010Module 7\uff1a\u884c\u653f\u7f70\u6cd5\u539f\u7406\u3011\u3002\u5c0f\u6668\u8001\u5e2b\uff0c\u65b0\u805e\u5e38\u770b\u5230\u9152\u99d5\u88ab\u6293\uff0c\u65e2\u8981\u79fb\u9001\u5211\u6cd5\u6cd5\u8fa6\u53c8\u8981\u88ab\u4ea4\u901a\u5c40\u958b\u7f70\u9370\uff0c\u9019\u6a23\u7b97\u4e0d\u7b97\u4e00\u884c\u70ba\u4e8c\u7f70\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u963f\u54f2\u554f\u5230\u5927\u8003\u8d85\u7d1a\u71b1\u9580\u8003\u9ede\u4e86\uff01\u300a\u884c\u653f\u7f70\u6cd5\u300b\u7b2c 24 \u689d\u898f\u5b9a\u300c\u4e00\u884c\u70ba\u4e0d\u4e8c\u7f70\u539f\u5247\u300d\uff0c\u4e26\u63a1\u53d6\u300c\u5211\u4e8b\u512a\u5148\u539f\u5247\u300d\uff01\u9152\u99d5\u89f8\u72af\u5211\u6cd5\u516c\u5171\u5371\u96aa\u7f6a\uff0c\u61c9\u5148\u7531\u6cd5\u9662\u5224\u8655\u5211\u4e8b\u7f70\uff1b\u53ea\u6709\u5728\u6aa2\u5bdf\u5b98\u4e0d\u8d77\u8a34\u6216\u7de9\u8d77\u8a34\u78ba\u5b9a\u5f8c\uff0c\u884c\u653f\u6a5f\u95dc\u59cb\u5f97\u88c1\u8655\u7f70\u9370\uff01\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u90a3\u6a5f\u95dc\u958b\u7f70\u524d\uff0c\u9700\u8981\u8b49\u660e\u6c11\u773e\u6709\u6545\u610f\u6216\u904e\u5931\u55ce\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u7d55\u5c0d\u8981\uff01\u4f9d\u64da\u7b2c 7 \u689d\u7b2c 1 \u9805\uff0c\u975e\u51fa\u65bc\u6545\u610f\u6216\u904e\u5931\u8005\u4e0d\u4e88\u8655\u7f70\uff0c\u81fa\u7063\u6cd5\u5f8b\u5df2\u5168\u9762\u5ee2\u9664\u820a\u6709\u7684\u63a8\u5b9a\u904e\u5931\u5236\u5ea6\uff0c\u6a5f\u95dc\u8ca0\u6709\u8209\u8b49\u8cac\u4efb\uff01\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u90a3\u672a\u6eff\u5341\u56db\u6b72\u4e4b\u4eba\u9055\u6cd5\u6703\u88ab\u7f70\u55ce\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u4f9d\u64da\u7b2c 9 \u689d\uff0c\u672a\u6eff\u5341\u56db\u6b72\u4eba\u7121\u8cac\u4efb\u80fd\u529b\u4e0d\u4e88\u8655\u7f70\uff1b\u5341\u56db\u6b72\u4ee5\u4e0a\u672a\u6eff\u5341\u516b\u6b72\u4eba\u5f97\u6e1b\u8f15\u8655\u7f70\uff01\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u8cac\u4efb\u80fd\u529b\u8207\u5211\u4e8b\u512a\u5148\u539f\u5247\uff0c\u771f\u662f\u4fdd\u969c\u4eba\u6b0a\u7684\u96d9\u91cd\u9632\u7dda\uff01\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u662f\u7684\uff01\u9019\u4e5f\u662f\u8003\u751f\u5728\u7d20\u990a\u9078\u64c7\u984c\u4e2d\u6700\u5bb9\u6613\u5931\u5206\u7684\u5730\u65b9\uff01\", \"8\": \"\u3010\u963f\u54f2\u3011\uff1a\u7b2c\u516b\u55ae\u5143\u3010Module 8\uff1a\u884c\u653f\u57f7\u884c\u6cd5\u8207\u5373\u6642\u5f37\u5236\u3011\u3002\u5c0f\u6668\u8001\u5e2b\uff0c\u5982\u679c\u6c11\u773e\u8cf4\u76ae\u4e0d\u7e73\u7f70\u55ae\u6216\u6b7b\u4e0d\u62c6\u9664\u9055\u5efa\uff0c\u570b\u5bb6\u600e\u9ebc\u767c\u63ee\u516c\u6b0a\u529b\u5f37\u5236\u57f7\u884c\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u4f9d\u64da\u300a\u884c\u653f\u57f7\u884c\u6cd5\u300b\uff0c\u516c\u6cd5\u91d1\u9322\u6b20\u6b3e\u79fb\u9001\u884c\u653f\u57f7\u884c\u7f72\u6263\u62bc\u7ba1\u6536\uff1b\u62c6\u9664\u9055\u5efa\u63a1\u7528\u300c\u4ee3\u5c65\u884c\u300d\uff08\u4ee3\u70ba\u62c6\u9664\u5411\u6c11\u773e\u6536\u8cbb\uff09\uff0c\u6216\u88c1\u8655\u300c\u6020\u91d1\u300d\uff08\u9023\u7e8c\u958b\u7f70\u76f4\u5230\u5c65\u884c\u70ba\u6b62\uff09\uff01\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u90a3\u98b1\u98a8\u5929\u8b66\u5bdf\u9810\u9632\u6027\u5f37\u5236\u5c01\u6a4b\uff0c\u6216\u662f\u9694\u96e2\u9189\u9152\u72c2\u66b4\u4e4b\u4eba\uff0c\u9019\u7b97\u884c\u653f\u8655\u7f70\u55ce\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u9019\u5c6c\u65bc\u7b2c 36 \u689d\u300c\u5373\u6642\u5f37\u5236\u300d\uff0c\u4fc2\u70ba\u963b\u6b62\u6025\u8feb\u5371\u96e3\u4e4b\u516c\u6cd5\u5408\u6cd5\u7279\u5225\u72a7\u7272\uff0c\u975e\u8655\u7f70\uff01\u82e5\u9020\u6210\u7279\u5225\u640d\u5bb3\u5f97\u8acb\u6c42\u570b\u5bb6\u7d66\u4e88\u640d\u5931\u88dc\u511f\uff01\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u90a3\u6c11\u773e\u5c0d\u5f37\u5236\u57f7\u884c\u4e0d\u670d\uff0c\u7a0b\u5e8f\u4e0a\u8a72\u600e\u9ebc\u6551\u6fdf\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u4f9d\u64da\u7b2c 9 \u689d\uff0c\u61c9\u65bc\u57f7\u884c\u7a0b\u5e8f\u7d42\u7d50\u524d\u5411\u57f7\u884c\u6a5f\u95dc\u8072\u660e\u7570\u8b70\uff01\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u8072\u660e\u7570\u8b70\u662f\u884c\u653f\u57f7\u884c\u5c08\u5c6c\u7684\u6551\u6fdf\u9014\u5f91\uff0c\u5927\u5bb6\u5343\u842c\u4e0d\u8981\u8ddf\u8a34\u9858\u6df7\u6dc6\u4e86\uff01\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u963f\u54f2\u63d0\u9192\u5f97\u592a\u53ca\u6642\u4e86\uff01\u63a5\u8457\u6211\u5011\u4f86\u770b\u6700\u95dc\u9375\u7684\u884c\u653f\u6551\u6fdf\u9ad4\u7cfb\uff01\", \"9\": \"\u3010\u963f\u54f2\u3011\uff1a\u7b2c\u4e5d\u55ae\u5143\u3010Module 9\uff1a\u884c\u653f\u6551\u6fdf\u9ad4\u7cfb\u3011\u3002\u5c0f\u6668\u8001\u5e2b\uff0c\u6536\u5230\u9055\u6cd5\u7f70\u55ae\u4e0d\u670d\uff0c\u6700\u6162\u8981\u5728\u5e7e\u5929\u5167\u63d0\u8d77\u8a34\u9858\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u8acb\u5927\u5bb6\u7262\u8a18\u300a\u8a34\u9858\u6cd5\u300b\u9001\u9054\u6b21\u65e5\u8d77\u300c30 \u65e5\u4e0d\u8b8a\u671f\u9593\u300d\uff0c\u5411\u539f\u8655\u5206\u6a5f\u95dc\u4e4b\u4e0a\u7d1a\u63d0\u8d77\u8a34\u9858\uff01\u63a1\u8a34\u9858\u524d\u7f6e\u539f\u5247\u3002\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u90a3\u8a34\u9858\u672a\u7372\u6551\u6fdf\u5f8c\uff0c\u884c\u653f\u8a34\u8a1f\u6709\u54ea\u5e7e\u7a2e\u5462\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u4e09\u5927\u8a34\u8a1f\u985e\u578b\uff1a\u64a4\u92b7\u8a34\u8a1f\uff08\u64a4\u92b7\u8ca0\u64d4\u8655\u5206\uff09\u3001\u8ab2\u4e88\u7fa9\u52d9\u8a34\u8a1f\uff08\u547d\u6a5f\u95dc\u6838\u767c\u8a31\u53ef\uff09\u8207\u4e00\u822c\u7d66\u4ed8/\u78ba\u8a8d\u8a34\u8a1f\uff01\u76ee\u524d\u63a1\u7528\u9ad8\u7b49\u884c\u653f\u8a34\u8a1f\u5ead\u8207\u6700\u9ad8\u884c\u653f\u6cd5\u9662\u4e09\u7d1a\u4e8c\u5be9\u5236\uff01\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u90a3\u63d0\u8d77\u8a34\u9858\u6216\u8a34\u8a1f\u671f\u9593\uff0c\u539f\u672c\u7684\u8655\u5206\u6703\u505c\u6b62\u57f7\u884c\u55ce\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u539f\u5247\u4e0a\u300c\u4e0d\u505c\u6b62\u57f7\u884c\u300d\uff01\u9664\u975e\u6709\u96e3\u4ee5\u56de\u5fa9\u4e4b\u91cd\u5927\u640d\u5bb3\u4e14\u60c5\u6cc1\u6025\u8feb\uff0c\u59cb\u5f97\u5411\u6cd5\u9662\u8072\u8acb\u505c\u6b62\u57f7\u884c\uff01\\n\\n\u3010\u963f\u54f2\u3011\uff1a30\u65e5\u4e0d\u8b8a\u671f\u9593\u52a0\u4e0a\u4e0d\u505c\u6b62\u57f7\u884c\u539f\u5247\uff0c\u771f\u662f\u6436\u6642\u9593\u6551\u6fdf\u7684\u95dc\u9375\u6982\u5ff5\uff01\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u5b8c\u5168\u6b63\u78ba\uff01\u6700\u5f8c\u6211\u5011\u4f86\u770b\u570b\u5bb6\u5982\u4f55\u5c0d\u4eba\u6c11\u8ca0\u64d4\u640d\u5bb3\u8ce0\u511f\u8cac\u4efb\uff01\", \"10\": \"\u3010\u963f\u54f2\u3011\uff1a\u6700\u7d42\u7ae0\u3010Module 10\uff1a\u570b\u5bb6\u8cac\u4efb\u8207\u5927\u8003\u7d50\u696d\u9326\u56ca\u3011\u3002\u5c0f\u6668\u8001\u5e2b\uff0c\u5982\u679c\u99ac\u8def\u65bd\u5de5\u6709\u5751\u6d1e\u5bb3\u9a0e\u58eb\u6454\u50b7\uff0c\u570b\u5bb6\u80fd\u63a8\u8a17\u4e0d\u77e5\u9053\u55ce\uff1f\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u7d55\u4e0d\u80fd\uff01\u4f9d\u64da\u300a\u570b\u5bb6\u8ce0\u511f\u6cd5\u300b\u7b2c 3 \u689d\u516c\u6709\u516c\u5171\u8a2d\u65bd\u7ba1\u7406\u6b20\u7f3a\uff0c\u570b\u5bb6\u8ca0\u300c\u7121\u904e\u5931\u8ce0\u511f\u8cac\u4efb\u300d\uff01\u800c\u7b2c 2 \u689d\u516c\u52d9\u54e1\u9055\u6cd5\u4fb5\u5bb3\u6b0a\u5229\u5247\u9700\u6709\u6545\u610f\u904e\u5931\u3002\u8acb\u6c42\u570b\u8ce0\u524d\u5fc5\u9808\u5148\u9032\u884c\u300c\u5354\u8b70\u5148\u884c\u7a0b\u5e8f\u300d\uff01\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u592a\u5145\u5be6\u4e86\uff01\u611f\u8b1d\u5c0f\u6668\u8001\u5e2b\u9019 30 \u5206\u9418\u5e36\u6211\u5011\u901a\u76e4\u8cab\u901a\u884c\u653f\u6cd5\u5341\u5927\u6a21\u7d44\uff01\u7528\u96d9\u4eba\u5ee3\u64ad\u5c0d\u8ac7\u7684\u65b9\u5f0f\u8907\u7fd2\uff0c\u807d\u5f97\u53c8\u6e05\u695a\u53c8\u8f15\u9b06\uff01\\n\\n\u3010\u5c0f\u6668\u3011\uff1a\u4e0d\u5ba2\u6c23\uff01\u6cd5\u5f8b\u662f\u7dad\u8b77\u6b0a\u5229\u8207\u81ea\u7531\u7684\u6b66\u5668\u3002\u795d\u5927\u5bb6\u5927\u8003\u9ad8\u5206\u596a\u6a19\uff0c\u300a\u884c\u653f\u6cd5 500 \u9801\u65d7\u8266\u7e3d\u8907\u7fd2\u300bPodcast\uff0c\u6211\u5011\u4e0b\u6b21\u898b\uff01\\n\\n\u3010\u963f\u54f2\u3011\uff1a\u795d\u5927\u5bb6\u91d1\u699c\u984c\u540d\uff0c\u52a0\u6cb9\uff01\u63b0\u63b0\uff01\"}");

        let currentChapterId = 1;
        let isPlayingState = false;

        const speechSynth = window.speechSynthesis;
        let voices = [];

        function loadVoices() {
            if (speechSynth) {
                voices = speechSynth.getVoices();
            }
        }
        loadVoices();
        if (speechSynth && speechSynth.onvoiceschanged !== undefined) {
            speechSynth.onvoiceschanged = loadVoices;
        }

        const audio = document.getElementById('mainAudio');
        const btnPlay = document.getElementById('btnPlay');
        const btnRewind = document.getElementById('btnRewind');
        const btnForward = document.getElementById('btnForward');
        const seekSlider = document.getElementById('seekSlider');
        const currentTimeEl = document.getElementById('currentTime');
        const durationTimeEl = document.getElementById('durationTime');
        const speedSelect = document.getElementById('speedSelect');
        const volumeSlider = document.getElementById('volumeSlider');
        const chapterPane = document.getElementById('chapterPane');
        const transcriptBox = document.getElementById('transcriptBox');
        const engineStatus = document.getElementById('engineStatus');
        const canvas = document.getElementById('waveformCanvas');
        const ctx = canvas.getContext('2d');

        // Render Chapter List
        chapters.forEach((ch, idx) => {
            const card = document.createElement('div');
            card.className = `chapter-card ${idx === 0 ? 'active' : ''}`;
            card.setAttribute('data-id', ch.id);
            card.innerHTML = `
                <div class="chapter-info">
                    <h4>${ch.title}</h4>
                    <p>📌 ${ch.topic}</p>
                </div>
                <span class="time-tag">${ch.time}</span>
            `;
            card.addEventListener('click', () => {
                playChapter(ch.id);
            });
            chapterPane.appendChild(card);
        });

        function setActiveChapterUI(id) {
            currentChapterId = id;
            document.querySelectorAll('.chapter-card').forEach(c => {
                if (parseInt(c.getAttribute('data-id')) === id) {
                    c.classList.add('active');
                    c.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    c.classList.remove('active');
                }
            });
            updateTranscriptView(id);
        }

        function updateTranscriptView(id) {
            if (fullScriptData[id]) {
                transcriptBox.textContent = fullScriptData[id];
            }
        }

        function playChapter(chId) {
            setActiveChapterUI(chId);
            const ch = chapters.find(c => c.id === chId);
            if (!ch) return;

            isPlayingState = true;
            btnPlay.textContent = "⏸️ 暫停廣播節目";

            // Try Audio Playback
            audio.currentTime = ch.start;
            let playPromise = audio.play();

            if (playPromise !== undefined) {
                playPromise.then(() => {
                    engineStatus.textContent = "🔊 音訊引擎發聲中：廣播節目播放中...";
                    if (speechSynth) speechSynth.cancel();
                }).catch(() => {
                    engineStatus.textContent = "🎙️ 語音引擎發聲中：已啟動瀏覽器高音質真人口播語音！";
                    speakScriptTTS(fullScriptData[chId] || ch.topic);
                });
            } else {
                speakScriptTTS(fullScriptData[chId] || ch.topic);
            }
        }

        function speakScriptTTS(scriptText) {
            if (!speechSynth) return;
            speechSynth.cancel();

            const cleanText = scriptText.replace(/【.*?】/g, '').replace(/（.*?）/g, '');
            const utter = new SpeechSynthesisUtterance(cleanText);
            utter.lang = 'zh-TW';
            utter.rate = parseFloat(speedSelect.value) || 1.0;
            utter.volume = parseFloat(volumeSlider.value) || 1.0;

            const zhVoice = voices.find(v => v.lang.includes('zh-TW') || v.lang.includes('zh-HK') || v.lang.includes('zh'));
            if (zhVoice) utter.voice = zhVoice;

            utter.onend = function() {
                if (isPlayingState && currentChapterId < 10) {
                    playChapter(currentChapterId + 1);
                } else {
                    pauseAll();
                }
            };

            speechSynth.speak(utter);
        }

        function pauseAll() {
            isPlayingState = false;
            audio.pause();
            if (speechSynth) speechSynth.cancel();
            btnPlay.textContent = "▶️ 點擊立即播放廣播節目";
            engineStatus.textContent = "⏸️ 已暫停播放（雙引擎就緒）";
        }

        btnPlay.addEventListener('click', () => {
            if (isPlayingState) {
                pauseAll();
            } else {
                playChapter(currentChapterId);
            }
        });

        btnRewind.addEventListener('click', () => {
            if (audio.currentTime > 0) audio.currentTime = Math.max(0, audio.currentTime - 10);
        });
        btnForward.addEventListener('click', () => {
            if (audio.duration) audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
        });

        seekSlider.addEventListener('input', (e) => {
            audio.currentTime = parseFloat(e.target.value);
        });

        speedSelect.addEventListener('change', (e) => {
            audio.playbackRate = parseFloat(e.target.value);
            if (speechSynth && speechSynth.speaking) {
                speakScriptTTS(fullScriptData[currentChapterId] || "");
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = parseFloat(e.target.value);
        });

        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        audio.addEventListener('loadedmetadata', () => {
            seekSlider.max = Math.floor(audio.duration || 1757);
            durationTimeEl.textContent = formatTime(audio.duration || 1757);
        });

        audio.addEventListener('timeupdate', () => {
            seekSlider.value = Math.floor(audio.currentTime);
            currentTimeEl.textContent = formatTime(audio.currentTime);

            const curSec = audio.currentTime;
            const curCh = chapters.find(c => curSec >= c.start && curSec < c.end);
            if (curCh && curCh.id !== currentChapterId) {
                setActiveChapterUI(curCh.id);
            }
        });

        // Dynamic Waveform Canvas Animation
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let animStep = 0;
        function drawWaveform() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const active = isPlayingState || !audio.paused || (speechSynth && speechSynth.speaking);
            const width = canvas.width;
            const height = canvas.height;
            const centerY = height / 2;

            ctx.lineWidth = 2.5;
            ctx.strokeStyle = active ? "#f59e0b" : "#475569";

            ctx.beginPath();
            const bars = 60;
            const barWidth = width / bars;

            for (let i = 0; i < bars; i++) {
                const amp = active ? Math.sin(animStep * 0.12 + i * 0.3) * 35 + Math.random() * 20 : 4;
                const x = i * barWidth + barWidth / 2;
                ctx.moveTo(x, centerY - amp);
                ctx.lineTo(x, centerY + amp);
            }
            ctx.stroke();

            if (active) animStep++;
            requestAnimationFrame(drawWaveform);
        }
        drawWaveform();
    </script>
</body>
</html>
